# Argo Events Sensor that triggers workflows from Falco alerts.
# Filters for WARNING and above to avoid triggering on noise.
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: falco-response
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: platformforge
spec:
  dependencies:
    - name: falco-alert
      eventSourceName: falco-alerts
      eventName: falco
      filters:
        data:
          # Only trigger on WARNING, ERROR, or CRITICAL events
          - path: body.priority
            type: string
            comparator: "in"
            value:
              - "Warning"
              - "Error"
              - "Critical"
  triggers:
    - template:
        name: falco-incident-response
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: falco-response-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: falco-incident-response
                arguments:
                  parameters:
                    - name: alert-priority
                    - name: alert-rule
                    - name: alert-output
                    - name: container-id
                    - name: namespace
          parameters:
            - src:
                dependencyName: falco-alert
                dataKey: body.priority
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: falco-alert
                dataKey: body.rule
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: falco-alert
                dataKey: body.output
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: falco-alert
                dataKey: body.output_fields.container.id
                dataTemplate: "{{ .Input | default \"unknown\" }}"
              dest: spec.arguments.parameters.3.value
            - src:
                dependencyName: falco-alert
                dataKey: body.output_fields.k8s.ns.name
                dataTemplate: "{{ .Input | default \"unknown\" }}"
              dest: spec.arguments.parameters.4.value
