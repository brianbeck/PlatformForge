name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'argocd/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'argocd/**'

jobs:
  # ─── YAML Lint + Raw Manifest Validation ─────────────────────
  yaml-lint:
    name: YAML Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install yamllint
        run: pip install yamllint==1.38.0

      - name: Lint platform/ YAML
        run: yamllint -c .yamllint.yml platform/

      # argocd/ moved to platformforge-env (private repo)
      # Only lint platform/ which stays in PlatformForge

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate raw Kubernetes manifests
        run: |
          kubeconform -strict -kubernetes-version 1.31.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas \
            -summary \
            platform/argo-rollouts/rbac/*.yaml \
            platform/gatekeeper/networkpolicy.yaml \
            platform/falco/rules/networkpolicy.yaml \
            platform/falco/rules/prometheusrules.yaml \
            platform/trivy-operator/prometheusrules.yaml

  # ─── Generate Helm Template Matrix ───────────────────────────
  generate-matrix:
    name: Generate Helm Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: echo "matrix=$(cat ci/helm-matrix.json | jq -c '.')" >> "$GITHUB_OUTPUT"

  # ─── Helm Template + kubeconform ─────────────────────────────
  helm-template:
    name: "Helm: ${{ matrix.dir }} (${{ matrix.env }})"
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Add Helm repo
        run: helm repo add ${{ matrix.repo_name }} ${{ matrix.repo_url }}

      - name: Helm template
        run: |
          helm template ${{ matrix.dir }}-${{ matrix.env }} \
            ${{ matrix.chart }} \
            --version ${{ matrix.version }} \
            --values platform/${{ matrix.dir }}/base-values.yaml \
            --namespace ${{ matrix.dir }} \
            > /tmp/rendered.yaml

      - name: Validate with kubeconform
        run: |
          kubeconform -kubernetes-version 1.31.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas \
            -summary \
            /tmp/rendered.yaml

  # ─── Gatekeeper Policy Test ──────────────────────────────────
  gatekeeper-test:
    name: Gatekeeper Policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install gator
        run: |
          curl -sL https://github.com/open-policy-agent/gatekeeper/releases/download/v3.22.0/gator-v3.22.0-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin gator

      - name: Test ConstraintTemplates
        run: |
          gator test \
            --filename=platform/gatekeeper/templates/

  # ─── Python CLI Tests ────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install CLI with dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
