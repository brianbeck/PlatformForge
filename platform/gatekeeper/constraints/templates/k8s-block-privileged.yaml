# Block privileged containers.
# Privileged containers have full access to the host and bypass most
# kernel-level isolation. Almost never needed for application workloads.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockprivileged
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    description: Blocks pods from running privileged containers
spec:
  crd:
    spec:
      names:
        kind: K8sBlockPrivileged
      validation:
        openAPIV3Schema:
          type: object
          properties:
            exemptImages:
              description: List of image patterns to exempt (glob supported)
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblockprivileged

        violation[{"msg": msg}] {
          container := input_containers[_]
          not is_exempt(container)
          container.securityContext.privileged == true
          msg := sprintf("Privileged container is not allowed: %v, securityContext: %v", [container.name, container.securityContext])
        }

        input_containers[c] {
          c := input.review.object.spec.containers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.initContainers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.ephemeralContainers[_]
        }

        is_exempt(container) {
          exempt_images := object.get(input, ["parameters", "exemptImages"], [])
          img := container.image
          glob.match(exempt_images[_], ["/"], img)
        }
