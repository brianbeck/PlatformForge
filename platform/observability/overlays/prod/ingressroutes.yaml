apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  labels:
    app.kubernetes.io/part-of: platformforge
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana-prod.brianbeck.net`)
      kind: Rule
      services:
        - name: observability-prod-grafana
          port: 80
          scheme: http
  tls:
    secretName: grafana-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - grafana-prod.brianbeck.net
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/part-of: platformforge
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prometheus-prod.brianbeck.net`)
      kind: Rule
      services:
        - name: prometheus-operated
          port: 9090
          scheme: http
  tls:
    secretName: prometheus-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-tls
spec:
  secretName: prometheus-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - prometheus-prod.brianbeck.net
