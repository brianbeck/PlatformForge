---
# PlatformForge Bootstrap Playbook
#
# This playbook:
#   1. Discovers the environment model (single or multi-cluster)
#   2. Discovers and verifies kubectl contexts
#   3. Optionally configures Traefik ingress and Pi-hole DNS
#   4. Installs and configures Argo CD
#   5. Applies AppProjects and Applications
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/bootstrap.yml

- name: Bootstrap PlatformForge
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Check for existing environment configuration
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../environments.yml"
      register: env_file

    - name: Load existing environment configuration
      when: env_file.stat.exists
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../environments.yml"
        name: saved_config
      ignore_errors: true

    - name: Set saved config defaults
      ansible.builtin.set_fact:
        saved: "{{ saved_config | default({}) }}"

    - name: Verify required tools are installed
      ansible.builtin.command:
        cmd: "{{ item }} version"
      loop:
        - kubectl
        - helm
        - git
      changed_when: false
      register: tool_check
      failed_when: tool_check.rc != 0

    - name: Display welcome message
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge Bootstrap
          ================================================

           This playbook will:
            1. Ask for your Git repository URL
            2. Ask which environment model you are using
            3. Discover and verify your kubectl contexts
            4. Optionally configure Traefik ingress
            5. Optionally configure Pi-hole DNS registration
            6. Install Argo CD
            7. Generate and apply AppProjects and Applications
               for Traefik, Falco, OPA Gatekeeper, and
               the Observability stack

          ================================================

  roles:
    - discover_environment
    - discover_contexts
    - discover_ingress
    - argocd_bootstrap
    - pihole_dns

  post_tasks:
    - name: Bootstrap complete
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge bootstrap complete!
          ================================================

           Environment config written to: environments.yml
           Argo CD is running and managing:
             - Falco (stage + prod)
             - OPA Gatekeeper (stage + prod)
             - Observability stack (stage + prod)
          {% if traefik_enabled | default(false) | bool %}
             - Traefik ingress (stage + prod)
          {% endif %}

           Next steps:
             1. Commit the generated manifests:
                git add argocd/ platform/ && git commit -m "Bootstrap: generate manifests" && git push
             2. Access Argo CD UI:
          {% if argocd_hostname_stage | default('') | length > 0 %}
                Stage: https://{{ argocd_hostname_stage }}
                Prod:  https://{{ argocd_hostname_prod }}
          {% else %}
                kubectl -n argocd port-forward svc/argocd-server 8080:80
          {% endif %}
             3. Verify Applications are syncing

          ================================================
