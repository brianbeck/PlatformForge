# Sealed Secrets Controller base Helm values

# Image pinned by digest for supply chain security
image:
  tag: "0.36.6@sha256:3cf5db7d1722710de8b9216c821cad2ff52e0d284843b205a86ce99af21b05a3"
# Encrypts secrets in Git; only the controller can decrypt them.

# Controller configuration
fullnameOverride: sealed-secrets-controller

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Metrics for Prometheus
metrics:
  serviceMonitor:
    enabled: true
    labels: {}
