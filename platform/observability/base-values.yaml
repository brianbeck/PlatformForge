# Observability Stack base Helm values (kube-prometheus-stack)
# Includes Prometheus, Alertmanager, Grafana, node-exporter, kube-state-metrics,
# and the Prometheus Operator (which processes ServiceMonitor/PrometheusRule CRDs).

# --- Images pinned by digest for supply chain security ---
# Digests are set inline in each component section below.
# kube-state-metrics digest set here (no other config for it):
kube-state-metrics:
  image:
    sha: "1545919b72e3ae035454fc054131e8d0f14b42ef6fc5b2ad5c751cafa6b2130e"

# --- Prometheus ---
prometheus:
  prometheusSpec:
    image:
      sha: "7571a304e67fbd794be02422b13627dc7de822152f74e99e2bef95d29eceecde"
    # Retain metrics for 15 days by default
    retention: 15d

    # Scrape interval
    scrapeInterval: 30s
    evaluationInterval: 30s

    # Select ALL ServiceMonitors and PrometheusRules regardless of labels.
    # This ensures Falco and Gatekeeper ServiceMonitors are picked up
    # without requiring a specific release label match.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

    # Storage -- use emptyDir by default, override with PVC in overlays
    storageSpec: {}

    # Remote write to external storage (uncomment and configure)
    # remoteWrite:
    #   - url: "https://your-remote-write-endpoint/api/v1/write"
    #     basicAuth:
    #       username:
    #         name: remote-write-credentials
    #         key: username
    #       password:
    #         name: remote-write-credentials
    #         key: password

  service:
    type: ClusterIP

# --- Component monitoring ---
# kube-prometheus-stack expects Services in kube-system for scraping
# control plane components. Some may not exist depending on the CNI
# or cluster provisioner (ClusterForge, kubeadm, etc.).
#
# etcd, kube-controller-manager, kube-scheduler: running as static
# pods but may lack a Service for Prometheus discovery. If alerts
# fire (etcdInsufficientMembers, etc.), create the missing Service
# in ClusterForge, or disable here as a workaround.
#
# kube-proxy: disabled if the cluster uses a CNI that replaces it
# (e.g., Cilium in kube-proxy replacement mode).
# TODO: Create headless Services in ClusterForge for etcd, kube-controller-manager,
# and kube-scheduler so Prometheus can scrape them. Then re-enable these.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

# --- Alertmanager ---
alertmanager:
  enabled: true

  alertmanagerSpec:
    image:
      sha: "88b605de9aba0410775c1eb3438f951115054e0d307f23f274a4c705f51630c1"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Use a pre-created Secret for Alertmanager config.
    # The Secret "alertmanager-config" is applied directly by
    # `platformforge deploy` and contains the notification provider
    # credentials (Slack webhook URL, SMTP password). This keeps
    # secrets out of Git-tracked Helm values.
    # If the Secret doesn't exist (notifications not configured),
    # Alertmanager uses the fallback config below.
    configSecret: alertmanager-config

  # Fallback config — used when configSecret doesn't exist yet
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: [alertname, namespace]

# --- Grafana ---
grafana:
  enabled: true
  image:
    sha: "83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505"

  adminPassword: ""  # Auto-generated; retrieve from secret

  service:
    type: ClusterIP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Sidecar picks up ConfigMaps with dashboards label
  sidecar:
    image:
      sha: "a6b3f707f883108376514489a94d6629109a327b2978e1d826cd104c4ca436df"
    dashboards:
      enabled: true
      label: grafana_dashboard
    datasources:
      enabled: true
      label: grafana_datasource

  # Default data source is the in-cluster Prometheus
  additionalDataSources: []

# --- Node exporter ---
nodeExporter:
  enabled: true
  image:
    sha: "337ff1d356b68d39cef853e8c6345de11ce7556bb34cda8bd205bcf2ed30b565"

# --- kube-state-metrics ---
kubeStateMetrics:
  enabled: true

# --- Prometheus Operator ---
prometheusOperator:
  image:
    sha: "fea93ca9be807eee2f51f4d997b7a2bf073d4051d9012b45b3c84a7b9e8b3f25"
  prometheusConfigReloader:
    image:
      sha: "959d47672fbff2776a04ec62b8afcec89e8c036af84dc5fade50019dab212746"
  admissionWebhooks:
    patch:
      image:
        sha: "43401e216e89e3a76911bda8b282262468467a613b3086e27bb36acb79cf1498"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- Default rules ---
# Enable the standard Kubernetes alerting rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
