---
# PlatformForge Teardown
#
# Cleanly removes all PlatformForge components from cluster(s).
# Deletes Argo CD Applications first (which triggers Argo CD to clean up
# the services it owns), then uninstalls Argo CD itself.
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/teardown.yml

- name: Teardown PlatformForge
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load environment configuration
      ansible.builtin.include_vars:
        file: "{{ env_repo_path }}/environments.yml"
      ignore_errors: true
      register: env_load

    - name: Fail if environment config not found
      ansible.builtin.assert:
        that:
          - env_load is not failed
        fail_msg: "environments.yml not found. Run bootstrap first."

    - name: Display teardown warning
      when: confirm_teardown_cli is not defined
      ansible.builtin.pause:
        prompt: |

          ================================================
           PlatformForge Teardown
          ================================================

           WARNING: This will remove ALL PlatformForge
           components from your cluster(s):

             - All Argo CD Applications + ApplicationSets
             - All platform services (Traefik, Observability,
               Gatekeeper, Falco, Trivy Operator)
             - Argo CD itself
             - All platform namespaces

           Stage context: {{ stage_context }}
          {% if multi_cluster | bool %}
           Prod context:  {{ prod_context }}
          {% endif %}

           Type 'yes' to proceed
      register: confirm_teardown

    - name: Abort if not confirmed
      when: confirm_teardown_cli is not defined
      ansible.builtin.assert:
        that:
          - confirm_teardown.user_input == 'yes'
        fail_msg: "Teardown aborted."

  tasks:
    - name: Set target environment flags
      ansible.builtin.set_fact:
        teardown_stage: "{{ target_env | default('all') in ['all', 'stage'] }}"
        teardown_prod: "{{ target_env | default('all') in ['all', 'prod'] }}"

    # ============================================================
    # STAGE CLUSTER
    # ============================================================

    - name: "STAGE: Delete all ApplicationSets"
      when: teardown_stage | bool
      ansible.builtin.shell:
        cmd: "kubectl --context {{ stage_context }} -n argocd delete applicationsets --all --wait=false 2>/dev/null; true"
      changed_when: false

    - name: "STAGE: Delete all Applications"
      when: teardown_stage | bool
      ansible.builtin.shell:
        cmd: "kubectl --context {{ stage_context }} -n argocd delete applications --all --wait=false 2>/dev/null; true"
      changed_when: false

    - name: "STAGE: Wait for Argo CD to clean up services"
      when: teardown_stage | bool
      ansible.builtin.pause:
        seconds: 30

    - name: "STAGE: Remove Traefik cluster-scoped resources"
      when: teardown_stage | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/name=traefik --ignore-not-found 2>/dev/null;
          kubectl --context {{ stage_context }} delete ingressclass traefik --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: "STAGE: Remove Gatekeeper webhooks and CRDs"
      when: teardown_stage | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration
          -l gatekeeper.sh/system=yes --ignore-not-found 2>/dev/null;
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration
          gatekeeper-validating-webhook-configuration --ignore-not-found 2>/dev/null;
          kubectl --context {{ stage_context }} delete constrainttemplates --all --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: "STAGE: Remove Observability webhooks and cluster resources"
      when: teardown_stage | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration,mutatingwebhookconfiguration
          -l app.kubernetes.io/instance=observability-stage --ignore-not-found 2>/dev/null;
          kubectl --context {{ stage_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/instance=observability-stage --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: "STAGE: Uninstall Argo CD"
      when: teardown_stage | bool
      ansible.builtin.shell:
        cmd: "helm --kube-context {{ stage_context }} uninstall argocd -n argocd --wait 2>/dev/null; true"
      changed_when: false

    - name: "STAGE: Delete all platform namespaces"
      when: teardown_stage | bool
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} delete namespace {{ item }} --ignore-not-found --wait=false"
      loop:
        - argocd
        - traefik
        - monitoring
        - monitoring-stage
        - gatekeeper-system
        - falco
        - falco-stage
        - trivy-system
        - sealed-secrets
        - external-secrets
        - cert-manager
        - argo-rollouts
      changed_when: false
      failed_when: false

    - name: "STAGE: Wait for namespace deletion"
      when: teardown_stage | bool
      ansible.builtin.pause:
        seconds: 15

    - name: "STAGE: Force-remove stuck namespaces"
      when: teardown_stage | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} get namespace {{ item }} -o json 2>/dev/null
          | jq '.spec.finalizers = []'
          | kubectl --context {{ stage_context }} replace --raw "/api/v1/namespaces/{{ item }}/finalize" -f - 2>/dev/null;
          true
      loop:
        - argocd
        - traefik
        - monitoring
        - monitoring-stage
        - gatekeeper-system
        - falco
        - falco-stage
        - trivy-system
        - sealed-secrets
        - external-secrets
        - cert-manager
        - argo-rollouts
      changed_when: false
      failed_when: false

    # ============================================================
    # PROD CLUSTER
    # ============================================================

    - name: "PROD: Delete all ApplicationSets"
      when: multi_cluster | bool and teardown_prod | bool
      ansible.builtin.shell:
        cmd: "kubectl --context {{ prod_context }} -n argocd delete applicationsets --all --wait=false 2>/dev/null; true"
      changed_when: false

    - name: "PROD: Delete all Applications"
      when: multi_cluster | bool and teardown_prod | bool
      ansible.builtin.shell:
        cmd: "kubectl --context {{ prod_context }} -n argocd delete applications --all --wait=false 2>/dev/null; true"
      changed_when: false

    - name: "PROD: Wait for Argo CD to clean up services"
      when: multi_cluster | bool and teardown_prod | bool
      ansible.builtin.pause:
        seconds: 30

    - name: "PROD: Remove Traefik cluster-scoped resources"
      when: multi_cluster | bool and teardown_prod | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/name=traefik --ignore-not-found 2>/dev/null;
          kubectl --context {{ prod_context }} delete ingressclass traefik --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: "PROD: Remove Gatekeeper webhooks and CRDs"
      when: multi_cluster | bool and teardown_prod | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration
          -l gatekeeper.sh/system=yes --ignore-not-found 2>/dev/null;
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration
          gatekeeper-validating-webhook-configuration --ignore-not-found 2>/dev/null;
          kubectl --context {{ prod_context }} delete constrainttemplates --all --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: "PROD: Remove Observability webhooks and cluster resources"
      when: multi_cluster | bool and teardown_prod | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration,mutatingwebhookconfiguration
          -l app.kubernetes.io/instance=observability-prod --ignore-not-found 2>/dev/null;
          kubectl --context {{ prod_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/instance=observability-prod --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: "PROD: Uninstall Argo CD"
      when: multi_cluster | bool and teardown_prod | bool
      ansible.builtin.shell:
        cmd: "helm --kube-context {{ prod_context }} uninstall argocd -n argocd --wait 2>/dev/null; true"
      changed_when: false

    - name: "PROD: Delete namespace-scoped namespaces"
      when: teardown_prod | bool
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete namespace {{ item }} --ignore-not-found --wait=false"
      loop:
        - falco-prod
        - monitoring-prod
      changed_when: false
      failed_when: false

    - name: "PROD: Delete cluster-scoped namespaces"
      when: multi_cluster | bool and teardown_prod | bool
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete namespace {{ item }} --ignore-not-found --wait=false"
      loop:
        - argocd
        - traefik
        - monitoring
        - gatekeeper-system
        - falco
        - trivy-system
        - sealed-secrets
        - external-secrets
        - cert-manager
        - argo-rollouts
      changed_when: false
      failed_when: false

    - name: "PROD: Wait for namespace deletion"
      when: teardown_prod | bool
      ansible.builtin.pause:
        seconds: 15

    - name: "PROD: Force-remove stuck namespaces"
      when: teardown_prod | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} get namespace {{ item }} -o json 2>/dev/null
          | jq '.spec.finalizers = []'
          | kubectl --context {{ prod_context }} replace --raw "/api/v1/namespaces/{{ item }}/finalize" -f - 2>/dev/null;
          true
      loop:
        - argocd
        - traefik
        - monitoring
        - monitoring-prod
        - gatekeeper-system
        - falco
        - falco-prod
        - trivy-system
        - sealed-secrets
        - external-secrets
        - cert-manager
        - argo-rollouts
      changed_when: false
      failed_when: false

  post_tasks:
    - name: Teardown complete
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge teardown complete!
          ================================================

           To redeploy:
             cd ansible
             ansible-playbook playbooks/install-argocd.yml

          ================================================
