---
# PlatformForge Bootstrap Playbook
#
# This playbook:
#   1. Prompts for configuration (repo URL, environment model, contexts, ingress)
#   2. Installs all platform services via Helm in dependency order
#   3. Registers Argo CD Applications for ongoing GitOps management
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/bootstrap.yml

- name: Bootstrap PlatformForge
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Check for existing environment configuration
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../environments.yml"
      register: env_file

    - name: Load existing environment configuration
      when: env_file.stat.exists
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../environments.yml"
        name: saved_config
      ignore_errors: true

    - name: Set saved config defaults
      ansible.builtin.set_fact:
        saved: "{{ saved_config | default({}) }}"

    - name: Use saved repo URL if available
      when: saved.platformforge_repo_url | default('') | length > 0 and 'YOUR_ORG' not in saved.platformforge_repo_url | default('')
      ansible.builtin.set_fact:
        platformforge_repo_url: "{{ saved.platformforge_repo_url }}"

    - name: Check if repo URL needs configuration
      ansible.builtin.set_fact:
        repo_needs_config: "{{ 'YOUR_ORG' in platformforge_repo_url }}"

    - name: Prompt for PlatformForge Git repository URL
      ansible.builtin.pause:
        prompt: |

          Enter your PlatformForge Git repository URL.
          This is the repo Argo CD will watch for changes.

          Examples:
            https://github.com/myorg/PlatformForge.git
            git@github.com:myorg/PlatformForge.git
          {% if not repo_needs_config | bool %}

          Current: {{ platformforge_repo_url }}
          Press Enter to keep, or type a new URL
          {% endif %}

          Repository URL
      register: repo_url_input

    - name: Set repo URL from user input
      when: repo_url_input.user_input | trim | length > 0
      ansible.builtin.set_fact:
        platformforge_repo_url: "{{ repo_url_input.user_input | trim }}"

    - name: Validate repo URL is not empty
      ansible.builtin.assert:
        that:
          - platformforge_repo_url | length > 0
          - "'YOUR_ORG' not in platformforge_repo_url"
        fail_msg: "Repository URL cannot be empty or contain YOUR_ORG placeholder."

    - name: Validate repo is reachable
      ansible.builtin.command:
        cmd: "git ls-remote {{ platformforge_repo_url }}"
      register: repo_check
      changed_when: false
      failed_when: repo_check.rc != 0

    - name: Display configured repo URL
      ansible.builtin.debug:
        msg: "Repository: {{ platformforge_repo_url }} (revision: {{ platformforge_repo_revision }})"

    - name: Verify required tools are installed
      ansible.builtin.command:
        cmd: "{{ item }} version"
      loop:
        - kubectl
        - helm
        - git
      changed_when: false
      register: tool_check
      failed_when: tool_check.rc != 0

    - name: Display welcome message
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge Bootstrap
          ================================================

           This playbook will:
            1. Discover your environment configuration
            2. Install all platform services in order:
               Traefik -> Observability -> Gatekeeper -> Falco -> Argo CD
            3. Register Argo CD Applications for GitOps management
            4. Configure DNS (if Pi-hole enabled)

          ================================================

  roles:
    - discover_environment
    - discover_contexts
    - discover_ingress
    - deploy_platform
    - pihole_dns

  post_tasks:
    - name: Bootstrap complete
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge bootstrap complete!
          ================================================

           All services are running and Argo CD is managing them.

           Next steps:
             1. Commit the generated manifests:
                git add argocd/ platform/ && git commit -m "Bootstrap: generate manifests" && git push
             2. Access Argo CD:
          {% if argocd_hostname_stage | default('') | length > 0 %}
                Stage: https://{{ argocd_hostname_stage }}
                Prod:  https://{{ argocd_hostname_prod }}
          {% else %}
                kubectl -n argocd port-forward svc/argocd-server 8080:80
          {% endif %}
             3. Verify all Applications show Synced/Healthy
             4. Run health check: ansible-playbook playbooks/healthcheck.yml

          ================================================
