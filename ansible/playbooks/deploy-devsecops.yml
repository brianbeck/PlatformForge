---
# Deploy DevSecOps Stack (OPA Gatekeeper + Falco)
#
# Prerequisites: bootstrap.yml has been run
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/deploy-devsecops.yml

- name: Deploy DevSecOps Stack (Gatekeeper + Falco)
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load environment configuration
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../environments.yml"

    - name: Set platform base path
      ansible.builtin.set_fact:
        platform_dir: "{{ playbook_dir }}/../../platform"

    - name: Set namespace facts for Model A
      when: single_cluster | bool
      ansible.builtin.set_fact:
        falco_stage_namespace: "falco-stage"
        falco_prod_namespace: "falco-prod"

    - name: Set namespace facts for Model B
      when: multi_cluster | bool
      ansible.builtin.set_fact:
        falco_stage_namespace: "falco"
        falco_prod_namespace: "falco"

  tasks:
    # ============================================================
    # GATEKEEPER
    # ============================================================

    - name: Add Gatekeeper Helm repository
      ansible.builtin.command:
        cmd: helm repo add gatekeeper https://open-policy-agent.github.io/gatekeeper/charts
      register: result
      changed_when: "'has been added' in result.stdout"
      failed_when: false

    - name: Update Gatekeeper Helm repository
      ansible.builtin.command:
        cmd: helm repo update gatekeeper
      changed_when: false

    # --- Clean up any dangling webhooks ---

    - name: Remove dangling Gatekeeper webhooks (stage)
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration
          gatekeeper-validating-webhook-configuration --ignore-not-found 2>/dev/null;
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration
          -l gatekeeper.sh/system=yes --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: Remove dangling Gatekeeper webhooks (prod)
      when: multi_cluster | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration
          gatekeeper-validating-webhook-configuration --ignore-not-found 2>/dev/null;
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration
          -l gatekeeper.sh/system=yes --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    # --- Install Gatekeeper core ---

    - name: Install Gatekeeper (stage)
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install gatekeeper-core-stage gatekeeper/gatekeeper
          --namespace gatekeeper-system --create-namespace
          --kube-context {{ stage_context }}
          --version 3.22.0
          --values {{ platform_dir }}/gatekeeper/base-values.yaml
          --values {{ platform_dir }}/gatekeeper/overlays/stage/values.yaml
          --wait --timeout 5m
      register: result
      changed_when: "'has been upgraded' in result.stdout or 'has been installed' in result.stdout"

    - name: Install Gatekeeper (prod)
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install gatekeeper-core-prod gatekeeper/gatekeeper
          --namespace gatekeeper-system --create-namespace
          --kube-context {{ prod_context }}
          --version 3.22.0
          --values {{ platform_dir }}/gatekeeper/base-values.yaml
          --values {{ platform_dir }}/gatekeeper/overlays/prod/values.yaml
          --wait --timeout 5m
      register: result
      changed_when: "'has been upgraded' in result.stdout or 'has been installed' in result.stdout"

    # --- Wait for Gatekeeper webhook to be ready ---

    - name: Wait for Gatekeeper controller (stage)
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ stage_context }} -n gatekeeper-system
          rollout status deployment/gatekeeper-controller-manager --timeout=120s
      changed_when: false

    - name: Wait for Gatekeeper controller (prod)
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ prod_context }} -n gatekeeper-system
          rollout status deployment/gatekeeper-controller-manager --timeout=120s
      changed_when: false

    - name: Display Gatekeeper core status
      ansible.builtin.debug:
        msg: "Gatekeeper core installed and webhook ready."

    # --- Apply ConstraintTemplates ---

    - name: Apply ConstraintTemplates (stage)
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f {{ platform_dir }}/gatekeeper/templates/"
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    - name: Apply ConstraintTemplates (prod)
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f {{ platform_dir }}/gatekeeper/templates/"
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    - name: Wait for ConstraintTemplate CRDs (stage)
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} get constrainttemplates"
      changed_when: false
      retries: 10
      delay: 5
      until: ct_check.rc == 0
      register: ct_check

    - name: Display ConstraintTemplate status
      ansible.builtin.debug:
        msg: "ConstraintTemplates applied. CRDs created."

    # --- Apply Constraints ---

    - name: Apply Constraints (stage)
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f {{ platform_dir }}/gatekeeper/constraints/stage/"
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"
      retries: 3
      delay: 10
      until: result.rc == 0

    - name: Apply Constraints (prod)
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f {{ platform_dir }}/gatekeeper/constraints/prod/"
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"
      retries: 3
      delay: 10
      until: result.rc == 0

    - name: Display Gatekeeper status
      ansible.builtin.debug:
        msg: "Gatekeeper fully deployed: core + templates + constraints."

    # ============================================================
    # FALCO
    # ============================================================

    - name: Add Falco Helm repository
      ansible.builtin.command:
        cmd: helm repo add falcosecurity https://falcosecurity.github.io/charts
      register: result
      changed_when: "'has been added' in result.stdout"
      failed_when: false

    - name: Update Falco Helm repository
      ansible.builtin.command:
        cmd: helm repo update falcosecurity
      changed_when: false

    - name: Install Falco (stage)
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install falco-stage falcosecurity/falco
          --namespace {{ falco_stage_namespace }} --create-namespace
          --kube-context {{ stage_context }}
          --version 8.0.1
          --values {{ platform_dir }}/falco/base-values.yaml
          --values {{ platform_dir }}/falco/overlays/stage/values.yaml
          --wait --timeout 5m
      register: result
      changed_when: "'has been upgraded' in result.stdout or 'has been installed' in result.stdout"

    - name: Install Falco (prod)
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install falco-prod falcosecurity/falco
          --namespace {{ falco_prod_namespace }} --create-namespace
          --kube-context {{ prod_context }}
          --version 8.0.1
          --values {{ platform_dir }}/falco/base-values.yaml
          --values {{ platform_dir }}/falco/overlays/prod/values.yaml
          --wait --timeout 5m
      register: result
      changed_when: "'has been upgraded' in result.stdout or 'has been installed' in result.stdout"

    - name: Apply Falco additional manifests (stage)
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} -n {{ falco_stage_namespace }} apply -k {{ platform_dir }}/falco/rules/"
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"
      failed_when: false

    - name: Apply Falco additional manifests (prod)
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} -n {{ falco_prod_namespace }} apply -k {{ platform_dir }}/falco/rules/"
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"
      failed_when: false

    - name: Display summary
      ansible.builtin.debug:
        msg: |
          DevSecOps Stack deployed.
            Gatekeeper: core + {{ (platform_dir + '/gatekeeper/templates/') | basename }} templates + constraints
            Falco: runtime security on all nodes
