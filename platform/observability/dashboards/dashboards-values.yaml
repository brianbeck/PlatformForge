# Grafana dashboards provisioned via Grafana.com dashboard IDs.
# The init container downloads JSON at startup; the dashboardProviders
# config tells Grafana to load them from the download directory.
# To add a new dashboard, find its ID at https://grafana.com/grafana/dashboards/
# and add an entry below.
grafana:
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: PlatformForge
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      argocd:
        gnetId: 14584
        revision: 1
        datasource: Prometheus
      falco:
        gnetId: 11914
        revision: 1
        datasource: Prometheus
      trivy-operator:
        gnetId: 16337
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
