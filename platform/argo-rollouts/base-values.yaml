# Argo Rollouts base Helm values
# Provides progressive delivery (blue-green, canary) for application
# Deployments. Consumed by DevExForge, which creates Rollout CRs in
# team namespaces.

# Install CRDs and keep them on uninstall (Argo CD owns lifecycle).
installCRDs: true
keepCRDs: true

controller:
  replicas: 1

  # NOTE: No traffic-router plugin is loaded. The historical
  # "argoproj-labs/traefik" plugin was never released and the official
  # Argo Rollouts docs now route Traefik users through the Gateway API
  # plugin -- which requires migrating Traefik from IngressRoute CRDs
  # to Gateway API resources. See README "Argo Rollouts" section and
  # the TODO in CLAUDE.md for the Phase 2 migration plan.
  #
  # In the meantime, Rollouts work in two modes:
  #   - blueGreen: service-selector swap (no traffic weighting needed)
  #   - canary:    replica-based, relies on Service round-robin
  # Both are sufficient for DevExForge's Phase 2 use case.

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        app.kubernetes.io/part-of: platformforge

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Web dashboard. Exposed via Traefik IngressRoute (see platform/argo-rollouts/overlays/<env>/ingressroute.yaml).
# Auth is intentionally disabled — dashboard sits behind internal Pi-hole DNS,
# not the public internet.
dashboard:
  enabled: true
  replicas: 1
  service:
    type: ClusterIP
    port: 3100
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ServiceAccount used by the controller. (Traefik IngressRoute RBAC was
# removed -- not needed without the traffic-router plugin.)
serviceAccount:
  create: true
  name: argo-rollouts
