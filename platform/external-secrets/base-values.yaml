# External Secrets Operator base Helm values
# Syncs secrets from external stores (Vault, AWS SSM, 1Password, etc.)
# into Kubernetes Secrets.

# Image pinned by digest for supply chain security
image:
  tag: "v2.3.0@sha256:c425f51f422506c380550ad32fbf155412c7be84dd1c4b196130dcf04497be80"

installCRDs: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceMonitor:
  enabled: true
  labels:
    app.kubernetes.io/part-of: platformforge

webhook:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

certController:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
