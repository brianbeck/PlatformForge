# Trivy Operator base Helm values
# Continuously scans running workloads for vulnerabilities and
# reports results as Kubernetes CRDs (VulnerabilityReport).

# Image pinned by digest for supply chain security
image:
  registry: mirror.gcr.io
  repository: aquasec/trivy-operator
  tag: "0.30.1@sha256:448484ece65e26f1c7237c8d20dab997f5a8319968286a09e188140b863cf1f9"

# Scan configuration
trivy:
  # Severity levels to include in reports
  severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

  # Scan timeout
  timeout: 5m0s

  # Use Trivy's built-in vulnerability database (downloaded automatically)
  # For air-gapped environments, configure a mirror
  ignoreUnfixed: false

# Operator configuration
operator:
  # Scan all namespaces except system ones
  scanJobsConcurrentLimit: 3

  # Rescan interval: how often to re-scan running workloads
  # New CVEs are published daily; 24h catches them within a day
  vulnerabilityScannerScanInterval: 24h

  # Scan on new workload creation
  vulnerabilityScannerEnabled: true

  # Scan ConfigAudit (checks for misconfigurations)
  configAuditScannerEnabled: true

  # Scan RBAC
  rbacAssessmentScannerEnabled: true

  # Scan secrets for exposure
  exposedSecretScannerEnabled: true

# ServiceMonitor for Prometheus scraping
serviceMonitor:
  enabled: true
  labels:
    app.kubernetes.io/part-of: platformforge

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Exclude platform namespaces from scanning (they're managed by PlatformForge)
excludeNamespaces: "kube-system,kube-node-lease,kube-public,argocd,gatekeeper-system,trivy-system"
