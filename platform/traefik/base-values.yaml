# Traefik Ingress Controller base Helm values
# Deployed as a LoadBalancer service via MetalLB.

# Image pinned by digest for supply chain security
image:
  tag: "v3.6.12@sha256:171c9c3565b29f6c133f1c1b43c5d4e5853415198e9e1078c001f8702ff66aec"

# Deployment configuration
deployment:
  replicas: 1

# Ingress class -- use a fixed name regardless of Helm release name
ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

# Service configuration -- MetalLB assigns an external IP
service:
  enabled: true
  type: LoadBalancer

# Entrypoints
ports:
  web:
    port: 8000
    exposedPort: 80
    protocol: TCP
    # Redirect HTTP to HTTPS
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    port: 8443
    exposedPort: 443
    protocol: TCP

# Enable Traefik API and dashboard (accessible internally via port-forward)
api:
  insecure: true
ingressRoute:
  dashboard:
    enabled: false

# Logs
logs:
  general:
    level: INFO
  access:
    enabled: true

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 128Mi

# Providers
providers:
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true
    publishedService:
      enabled: true
  kubernetesCRD:
    enabled: false
  kubernetesGateway:
    enabled: true

# Disable the Helm chart's auto-created Gateway resource.
# PlatformForge manages its own Gateway (applied by Ansible) with
# cross-namespace routing (allowedRoutes.namespaces.from: All).
# The chart's default uses from: Same which blocks cross-namespace HTTPRoutes.
gateway:
  enabled: false
