# Falco prod overlay
# Layered on top of base-values.yaml

# Prod: larger resource allocation
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Enable falcosidekick in prod for alert forwarding
falcosidekick:
  enabled: true
  config:
    debug: false
  # Webhook output for Argo Events integration
  # Uncomment and set URL when Argo Events EventSource is deployed
  # webhook:
  #   address: "http://falco-eventsource-svc.argo-events.svc.cluster.local:12000/falco"
