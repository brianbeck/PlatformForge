# TLS certificate for the Trivy admission provider service.
# Required by Gatekeeper External Data API (TLS 1.3 minimum).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trivy-admission-provider-tls
  namespace: gatekeeper-system
  labels:
    app.kubernetes.io/name: trivy-admission-provider
    app.kubernetes.io/part-of: platformforge
spec:
  secretName: trivy-admission-provider-tls
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  isCA: false
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
  dnsNames:
    - trivy-admission-provider
    - trivy-admission-provider.gatekeeper-system
    - trivy-admission-provider.gatekeeper-system.svc
    - trivy-admission-provider.gatekeeper-system.svc.cluster.local
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
