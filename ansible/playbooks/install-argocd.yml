---
# Install Argo CD and deploy all platform services via ApplicationSets.
#
# Prerequisites: bootstrap.yml has been run
#
# Argo CD is the sole owner of all platform services after this playbook.
# Ansible only installs Argo CD itself; everything else is managed via GitOps.
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/install-argocd.yml

- name: Install Argo CD and Deploy Platform
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load environment configuration
      ansible.builtin.include_vars:
        file: "{{ env_repo_path }}/environments.yml"

    - name: Verify required tools
      ansible.builtin.command:
        cmd: "{{ item }} version"
      loop:
        - kubectl
        - helm
      changed_when: false
      register: tool_check
      failed_when: tool_check.rc != 0

    - name: Verify kubeseal is installed
      ansible.builtin.command:
        cmd: which kubeseal
      changed_when: false
      register: kubeseal_check
      failed_when: kubeseal_check.rc != 0

  roles:
    - argocd_install
    - pihole_dns
