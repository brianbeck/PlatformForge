---
# PlatformForge bootstrap configuration

# Argo CD
argocd_namespace: argocd
argocd_chart_version: "9.4.17"
argocd_helm_repo: https://argoproj.github.io/argo-helm

# Git repositories (update to your fork/clone URLs)
platformforge_repo_url: "https://github.com/YOUR_ORG/PlatformForge.git"
platformforge_repo_revision: "main"
env_repo_url: "https://github.com/YOUR_ORG/platformforge-env.git"
env_repo_revision: "main"

# Namespace conventions
# Model A: namespaces are suffixed (-stage, -prod)
# Model B: namespaces are plain (deployed to separate clusters)
stage_namespace_suffix: "-stage"
prod_namespace_suffix: "-prod"

# Platform services
falco_namespace: falco
gatekeeper_namespace: gatekeeper-system

# Argo Rollouts (progressive delivery)
argo_rollouts_chart_version: "2.40.9"
