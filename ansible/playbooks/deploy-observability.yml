---
# Deploy Observability Stack (Prometheus, Grafana, Alertmanager)
#
# Prerequisites: bootstrap.yml has been run, deploy-ingress.yml (optional)
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/deploy-observability.yml

- name: Deploy Observability Stack
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load environment configuration
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../environments.yml"

    - name: Set platform base path
      ansible.builtin.set_fact:
        platform_dir: "{{ playbook_dir }}/../../platform"

    - name: Set namespace facts for Model A
      when: single_cluster | bool
      ansible.builtin.set_fact:
        monitoring_stage_namespace: "monitoring-stage"
        monitoring_prod_namespace: "monitoring-prod"

    - name: Set namespace facts for Model B
      when: multi_cluster | bool
      ansible.builtin.set_fact:
        monitoring_stage_namespace: "monitoring"
        monitoring_prod_namespace: "monitoring"

  tasks:
    - name: Add Prometheus community Helm repository
      ansible.builtin.command:
        cmd: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      register: result
      changed_when: "'has been added' in result.stdout"
      failed_when: false

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update prometheus-community
      changed_when: false

    # --- Clean up any orphaned resources from previous installs ---

    - name: Clean up orphaned webhooks (stage)
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration
          -l app.kubernetes.io/instance=observability-stage --ignore-not-found 2>/dev/null;
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration
          -l app.kubernetes.io/instance=prometheus-stack-stage --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: Clean up orphaned jobs (stage)
      ansible.builtin.shell:
        cmd: "kubectl --context {{ stage_context }} delete jobs --all -n {{ monitoring_stage_namespace }} --grace-period=0 --force 2>/dev/null; true"
      changed_when: false

    - name: Clean up orphaned Helm secrets (stage)
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete secrets -n {{ monitoring_stage_namespace }}
          -l status=pending-install 2>/dev/null;
          true
      changed_when: false

    # --- Build values file list ---

    - name: Check if ingress values exist (stage)
      ansible.builtin.stat:
        path: "{{ platform_dir }}/observability/overlays/stage/ingress-values.yaml"
      register: stage_ingress_values

    - name: Check if ingress values exist (prod)
      ansible.builtin.stat:
        path: "{{ platform_dir }}/observability/overlays/prod/ingress-values.yaml"
      register: prod_ingress_values

    # --- Install ---

    - name: Install Observability Stack (stage)
      ansible.builtin.shell:
        cmd: >-
          helm upgrade --install observability-stage prometheus-community/kube-prometheus-stack
          --namespace {{ monitoring_stage_namespace }} --create-namespace
          --kube-context {{ stage_context }}
          --version 82.15.1
          --values {{ platform_dir }}/observability/base-values.yaml
          --values {{ platform_dir }}/observability/overlays/stage/values.yaml
          {{ '--values ' + platform_dir + '/observability/overlays/stage/ingress-values.yaml' if stage_ingress_values.stat.exists else '' }}
          --wait --timeout 10m
      register: result
      changed_when: "'has been upgraded' in result.stdout or 'has been installed' in result.stdout"

    - name: Display stage status
      ansible.builtin.debug:
        msg: "Observability Stack deployed to stage ({{ monitoring_stage_namespace }})"

    # --- Prod ---

    - name: Clean up orphaned webhooks (prod)
      when: multi_cluster | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration
          -l app.kubernetes.io/instance=observability-prod --ignore-not-found 2>/dev/null;
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration
          -l app.kubernetes.io/instance=prometheus-stack-prod --ignore-not-found 2>/dev/null;
          true
      changed_when: false

    - name: Clean up orphaned jobs (prod)
      when: multi_cluster | bool
      ansible.builtin.shell:
        cmd: "kubectl --context {{ prod_context }} delete jobs --all -n {{ monitoring_prod_namespace }} --grace-period=0 --force 2>/dev/null; true"
      changed_when: false

    - name: Clean up orphaned Helm secrets (prod)
      when: multi_cluster | bool
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete secrets -n {{ monitoring_prod_namespace }}
          -l status=pending-install 2>/dev/null;
          true
      changed_when: false

    - name: Install Observability Stack (prod)
      when: multi_cluster | bool
      ansible.builtin.shell:
        cmd: >-
          helm upgrade --install observability-prod prometheus-community/kube-prometheus-stack
          --namespace {{ monitoring_prod_namespace }} --create-namespace
          --kube-context {{ prod_context }}
          --version 82.15.1
          --values {{ platform_dir }}/observability/base-values.yaml
          --values {{ platform_dir }}/observability/overlays/prod/values.yaml
          {{ '--values ' + platform_dir + '/observability/overlays/prod/ingress-values.yaml' if prod_ingress_values.stat.exists else '' }}
          --wait --timeout 10m
      register: result
      changed_when: "'has been upgraded' in result.stdout or 'has been installed' in result.stdout"

    # --- IngressRoutes ---

    - name: Apply Grafana IngressRoute (stage)
      when: ingress_enabled | default(false) | bool and grafana_hostname_stage | default('') | length > 0
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/argocd_bootstrap/templates/ingressroutes/grafana.yml.j2"
        dest: "/tmp/grafana-ir-stage.yml"
        mode: "0644"
      vars:
        grafana_hostname: "{{ grafana_hostname_stage }}"
        monitoring_namespace: "{{ monitoring_stage_namespace }}"
        env_suffix: "stage"

    - name: Apply stage Grafana IngressRoute
      when: ingress_enabled | default(false) | bool and grafana_hostname_stage | default('') | length > 0
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f /tmp/grafana-ir-stage.yml"
      changed_when: true

    - name: Apply Prometheus IngressRoute (stage)
      when: ingress_enabled | default(false) | bool and prometheus_hostname_stage | default('') | length > 0
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/argocd_bootstrap/templates/ingressroutes/prometheus.yml.j2"
        dest: "/tmp/prometheus-ir-stage.yml"
        mode: "0644"
      vars:
        prometheus_hostname: "{{ prometheus_hostname_stage }}"
        monitoring_namespace: "{{ monitoring_stage_namespace }}"
        env_suffix: "stage"

    - name: Apply stage Prometheus IngressRoute
      when: ingress_enabled | default(false) | bool and prometheus_hostname_stage | default('') | length > 0
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f /tmp/prometheus-ir-stage.yml"
      changed_when: true

    - name: Apply Grafana IngressRoute (prod)
      when: multi_cluster | bool and ingress_enabled | default(false) | bool and grafana_hostname_prod | default('') | length > 0
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/argocd_bootstrap/templates/ingressroutes/grafana.yml.j2"
        dest: "/tmp/grafana-ir-prod.yml"
        mode: "0644"
      vars:
        grafana_hostname: "{{ grafana_hostname_prod }}"
        monitoring_namespace: "{{ monitoring_prod_namespace }}"
        env_suffix: "prod"

    - name: Apply prod Grafana IngressRoute
      when: multi_cluster | bool and ingress_enabled | default(false) | bool and grafana_hostname_prod | default('') | length > 0
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f /tmp/grafana-ir-prod.yml"
      changed_when: true

    - name: Apply Prometheus IngressRoute (prod)
      when: multi_cluster | bool and ingress_enabled | default(false) | bool and prometheus_hostname_prod | default('') | length > 0
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/argocd_bootstrap/templates/ingressroutes/prometheus.yml.j2"
        dest: "/tmp/prometheus-ir-prod.yml"
        mode: "0644"
      vars:
        prometheus_hostname: "{{ prometheus_hostname_prod }}"
        monitoring_namespace: "{{ monitoring_prod_namespace }}"
        env_suffix: "prod"

    - name: Apply prod Prometheus IngressRoute
      when: multi_cluster | bool and ingress_enabled | default(false) | bool and prometheus_hostname_prod | default('') | length > 0
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f /tmp/prometheus-ir-prod.yml"
      changed_when: true

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/grafana-ir-stage.yml
        - /tmp/grafana-ir-prod.yml
        - /tmp/prometheus-ir-stage.yml
        - /tmp/prometheus-ir-prod.yml

    - name: Display summary
      ansible.builtin.debug:
        msg: |
          Observability Stack deployed.
          {% if grafana_hostname_stage | default('') | length > 0 %}
            Stage Grafana:    https://{{ grafana_hostname_stage }}
            Stage Prometheus: https://{{ prometheus_hostname_stage }}
          {% endif %}
          {% if multi_cluster | bool and grafana_hostname_prod | default('') | length > 0 %}
            Prod Grafana:     https://{{ grafana_hostname_prod }}
            Prod Prometheus:  https://{{ prometheus_hostname_prod }}
          {% endif %}
