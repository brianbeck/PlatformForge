---
# Deploy all PlatformForge services in the correct order.
#
# Prerequisites: bootstrap.yml has been run
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/deploy-all.yml

- name: "Step 1: Deploy Traefik Ingress"
  ansible.builtin.import_playbook: deploy-ingress.yml

- name: "Step 2: Deploy Observability Stack"
  ansible.builtin.import_playbook: deploy-observability.yml

- name: "Step 3: Deploy DevSecOps Stack"
  ansible.builtin.import_playbook: deploy-devsecops.yml

- name: "Step 4: Deploy Argo CD and register Applications"
  ansible.builtin.import_playbook: deploy-continuousdeployment.yml

- name: "Step 5: Register DNS with Pi-hole"
  ansible.builtin.import_playbook: deploy-dns.yml
