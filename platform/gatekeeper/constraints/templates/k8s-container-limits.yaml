# Require resource limits on containers.
# Prevents unbounded resource consumption that can affect other workloads.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8scontainerlimits
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    description: Requires containers to have resource limits set
spec:
  crd:
    spec:
      names:
        kind: K8sContainerLimits
      validation:
        openAPIV3Schema:
          type: object
          properties:
            requireCPU:
              type: boolean
            requireMemory:
              type: boolean
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8scontainerlimits

        violation[{"msg": msg}] {
          container := input_containers[_]
          require_cpu
          not container.resources.limits.cpu
          msg := sprintf("Container <%v> has no CPU limit", [container.name])
        }

        violation[{"msg": msg}] {
          container := input_containers[_]
          require_memory
          not container.resources.limits.memory
          msg := sprintf("Container <%v> has no memory limit", [container.name])
        }

        input_containers[c] {
          c := input.review.object.spec.containers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.initContainers[_]
        }

        require_cpu {
          object.get(input, ["parameters", "requireCPU"], true)
        }

        require_memory {
          object.get(input, ["parameters", "requireMemory"], true)
        }
