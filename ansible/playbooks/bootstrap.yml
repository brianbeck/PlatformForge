---
# PlatformForge Bootstrap Playbook
#
# This playbook:
#   1. Discovers the environment model (single or multi-cluster)
#   2. Discovers and verifies kubectl contexts
#   3. Installs and configures Argo CD
#   4. Applies AppProjects and Applications
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/bootstrap.yml

- name: Bootstrap PlatformForge
  hosts: localhost
  gather_facts: true

  pre_tasks:
    - name: Verify required tools are installed
      ansible.builtin.command:
        cmd: "{{ item }} version"
      loop:
        - kubectl
        - helm
        - git
      changed_when: false
      register: tool_check
      failed_when: tool_check.rc != 0

    - name: Display welcome message
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge Bootstrap
          ================================================

           This playbook will:
            1. Ask for your Git repository URL
            2. Ask which environment model you are using
            3. Discover and verify your kubectl contexts
            4. Install Argo CD
            5. Generate and apply AppProjects and Applications
               for Falco, OPA Gatekeeper, and Prometheus

          ================================================

  roles:
    - discover_environment
    - discover_contexts
    - argocd_bootstrap

  post_tasks:
    - name: Bootstrap complete
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge bootstrap complete!
          ================================================

           Environment config written to: environments.yml
           Argo CD is running and managing:
             - Falco (stage + prod)
             - OPA Gatekeeper (stage + prod)
             - kube-prometheus-stack (stage + prod)

           Next steps:
             1. Commit the generated argocd/ manifests:
                git add argocd/ && git commit -m "Bootstrap: generate Argo CD manifests" && git push
             2. Access Argo CD UI (see instructions above)
             3. Verify Applications are syncing

          ================================================
