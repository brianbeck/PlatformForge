# Alertmanager receiver configuration
# Generated by platformforge deploy — routes alerts to slack
alertmanager:
  config:
    receivers:
      - name: "null"
      - name: critical
        slack_configs:
          - api_url: ""
            channel: "#platform-prod"
            title: '{{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *{{ .Labels.severity | toUpper }}* {{ .Labels.alertname }}
              Namespace: {{ .Labels.namespace }}
              {{ .Annotations.description }}
              {{ end }}
            send_resolved: true
