# Prod Constraints
# All constraints use "deny" enforcement in prod. Violations block
# the admission request and prevent non-compliant resources from
# being created or updated.
#
# Platform namespaces are excluded -- these services are managed by
# PlatformForge and have their own security requirements (e.g. Falco
# needs root and privileged access for eBPF).
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockPrivileged
metadata:
  name: block-privileged-containers
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-prod
      - monitoring
      - monitoring-prod
      - traefik
      - trivy-system
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: require-team-label
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-prod
      - monitoring
      - monitoring-prod
      - traefik
      - trivy-system
  parameters:
    labels:
      - key: "app.kubernetes.io/managed-by"
      - key: "app.kubernetes.io/name"
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sContainerLimits
metadata:
  name: require-resource-limits
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-prod
      - monitoring
      - monitoring-prod
      - traefik
      - trivy-system
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockLatestTag
metadata:
  name: block-latest-tag
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-prod
      - monitoring
      - monitoring-prod
      - traefik
      - trivy-system
  parameters:
    exemptImages: []
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockHostNamespace
metadata:
  name: block-host-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-prod
      - monitoring
      - monitoring-prod
      - traefik
      - trivy-system
  parameters:
    allowHostNetwork: false
    allowHostPID: false
    allowHostIPC: false
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireNonRoot
metadata:
  name: require-nonroot
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-prod
      - monitoring
      - monitoring-prod
      - traefik
      - trivy-system
