apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platformforge
    platformforge/env: prod
    platformforge/service: gatekeeper
spec:
  project: platform-prod

  sources:
    - repoURL: https://open-policy-agent.github.io/gatekeeper/charts
      chart: gatekeeper
      targetRevision: "3.18.2"
      helm:
        valueFiles:
          - $values/platform/gatekeeper/base-values.yaml
          - $values/platform/gatekeeper/overlays/prod/values.yaml

    - repoURL: https://github.com/YOUR_ORG/PlatformForge.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/YOUR_ORG/PlatformForge.git
      targetRevision: main
      path: platform/gatekeeper/constraints/templates

    - repoURL: https://github.com/YOUR_ORG/PlatformForge.git
      targetRevision: main
      path: platform/gatekeeper/constraints/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system

  # Prod: manual sync only
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
