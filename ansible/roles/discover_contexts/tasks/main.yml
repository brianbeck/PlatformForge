---
# Discover and verify kubectl contexts for the target clusters.

- name: Get current kubectl contexts
  ansible.builtin.command:
    cmd: kubectl config get-contexts -o name
  register: kube_contexts_raw
  changed_when: false

- name: Parse available contexts
  ansible.builtin.set_fact:
    available_contexts: "{{ kube_contexts_raw.stdout_lines }}"

- name: Display available contexts
  ansible.builtin.debug:
    msg: |
      Available kubectl contexts:
      {% for ctx in available_contexts %}
        {{ loop.index }}. {{ ctx }}
      {% endfor %}

# --- Single cluster (Model A) ---

- name: Prompt for cluster context (Model A)
  when: single_cluster | bool
  ansible.builtin.pause:
    prompt: |

      You selected Model A (single cluster).
      Enter the kubectl context name for your cluster
  register: single_context_input

- name: Set single cluster context
  when: single_cluster | bool
  ansible.builtin.set_fact:
    cluster_context: "{{ single_context_input.user_input | trim }}"
    stage_context: "{{ single_context_input.user_input | trim }}"
    prod_context: "{{ single_context_input.user_input | trim }}"

- name: Validate single cluster context
  when: single_cluster | bool
  ansible.builtin.assert:
    that:
      - cluster_context in available_contexts
    fail_msg: "Context '{{ cluster_context }}' not found. Available: {{ available_contexts | join(', ') }}"

# --- Multi cluster (Model B) ---

- name: Get context details (Model B)
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: kubectl config get-contexts
  register: kube_contexts_detail
  changed_when: false

- name: Display context details (Model B)
  when: multi_cluster | bool
  ansible.builtin.debug:
    msg: "{{ kube_contexts_detail.stdout }}"

- name: Prompt for stage context (Model B)
  when: multi_cluster | bool
  ansible.builtin.pause:
    prompt: |

      You selected Model B (separate clusters).
      Enter the kubectl context name for the STAGE cluster
  register: stage_context_input

- name: Prompt for prod context (Model B)
  when: multi_cluster | bool
  ansible.builtin.pause:
    prompt: "Enter the kubectl context name for the PROD cluster"
  register: prod_context_input

- name: Set multi-cluster contexts
  when: multi_cluster | bool
  ansible.builtin.set_fact:
    stage_context: "{{ stage_context_input.user_input | trim }}"
    prod_context: "{{ prod_context_input.user_input | trim }}"

- name: Validate stage context (Model B)
  when: multi_cluster | bool
  ansible.builtin.assert:
    that:
      - stage_context in available_contexts
    fail_msg: "Stage context '{{ stage_context }}' not found. Available: {{ available_contexts | join(', ') }}"

- name: Validate prod context (Model B)
  when: multi_cluster | bool
  ansible.builtin.assert:
    that:
      - prod_context in available_contexts
    fail_msg: "Prod context '{{ prod_context }}' not found. Available: {{ available_contexts | join(', ') }}"

- name: Verify stage and prod are different clusters (Model B)
  when: multi_cluster | bool
  ansible.builtin.assert:
    that:
      - stage_context != prod_context
    fail_msg: "Stage and prod contexts must be different in Model B. Use Model A for single-cluster deployments."

# --- Fetch cluster server URLs ---

- name: Get stage cluster server URL
  ansible.builtin.command:
    cmd: "kubectl config view -o jsonpath='{.clusters[?(@.name==\"{{ stage_context }}\")].cluster.server}'"
  register: stage_server_raw
  changed_when: false
  failed_when: false

- name: Get prod cluster server URL
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: "kubectl config view -o jsonpath='{.clusters[?(@.name==\"{{ prod_context }}\")].cluster.server}'"
  register: prod_server_raw
  changed_when: false
  failed_when: false

- name: Set cluster server facts
  ansible.builtin.set_fact:
    stage_server: "{{ stage_server_raw.stdout | default('https://kubernetes.default.svc') }}"
    prod_server: >-
      {{ (prod_server_raw.stdout | default('https://kubernetes.default.svc'))
         if multi_cluster | bool
         else 'https://kubernetes.default.svc' }}

# --- Write environment config ---

- name: Write environment configuration
  ansible.builtin.copy:
    content: |
      # PlatformForge environment configuration
      # Generated by bootstrap on {{ ansible_facts["date_time"]["iso8601"] }}
      ---
      env_model: "{{ env_model }}"
      single_cluster: {{ single_cluster }}
      multi_cluster: {{ multi_cluster }}
      stage_context: "{{ stage_context }}"
      prod_context: "{{ prod_context }}"
      stage_server: "{{ stage_server }}"
      prod_server: "{{ prod_server }}"
    dest: "{{ playbook_dir }}/../../environments.yml"
    mode: "0644"

- name: Display environment summary
  ansible.builtin.debug:
    msg: |
      Environment Configuration Summary
      ==================================
      Model:         {{ env_model }} ({{ 'Single cluster' if single_cluster else 'Multi-cluster' }})
      Stage context:  {{ stage_context }}
      {% if multi_cluster | bool %}
      Prod context:   {{ prod_context }}
      {% endif %}
      Stage server:   {{ stage_server }}
      Prod server:    {{ prod_server }}
