# Argo Rollouts base Helm values
# Provides progressive delivery (blue-green, canary) for application
# Deployments. Consumed by DevExForge, which creates Rollout CRs in
# team namespaces.

# Image pinned by digest for supply chain security
image:
  tag: "v1.9.0@sha256:13346024500167f71815e1dcd7671f46378137e726ef03b2baf69a188224f813"

# Install CRDs and keep them on uninstall (Argo CD owns lifecycle).
installCRDs: true
keepCRDs: true

controller:
  replicas: 1

  # Gateway API traffic router plugin for weighted canary deployments.
  # Argo Rollouts manipulates HTTPRoute backendRef weights to shift
  # traffic between stable and canary services during a canary rollout.
  # Requires Gateway API CRDs (v1.4.0) and a Traefik Gateway resource.
  trafficRouterPlugins:
    - name: "argoproj-labs/gatewayAPI"
      location: "https://github.com/argoproj-labs/rollouts-plugin-trafficrouter-gatewayapi/releases/download/v0.13.0/gatewayapi-plugin-linux-amd64"

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels: {}

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Web dashboard — image pinned by digest
dashboard:
  enabled: true
  replicas: 1
  image:
    tag: "v1.9.0@sha256:86e1040c5d12cf4ec5c0d6205c5ca9f51677ad8ddc478a1f0790de9296f190e7"
  service:
    type: ClusterIP
    port: 3100
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ServiceAccount used by the controller.
serviceAccount:
  create: true
  name: argo-rollouts
