---
# PlatformForge Health Check Playbook
#
# Checks the health of all PlatformForge services across all clusters.
# Reads configuration from environments.yml (generated by bootstrap).
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/healthcheck.yml

- name: PlatformForge Health Check
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load environment configuration
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../environments.yml"
      register: env_load

    - name: Fail if environment config not found
      ansible.builtin.assert:
        that:
          - env_load is not failed
        fail_msg: "environments.yml not found. Run bootstrap first."

    - name: Display header
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge Health Check
          ================================================
           Model: {{ env_model }} ({{ 'Single cluster' if single_cluster else 'Multi-cluster' }})
           Stage: {{ stage_context }}
           {% if multi_cluster | bool %}Prod:  {{ prod_context }}{% endif %}

          ================================================

  tasks:
    # ===========================================================
    # STAGE CLUSTER
    # ===========================================================

    - name: "STAGE: Check cluster connectivity"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} cluster-info"
      register: stage_cluster_info
      changed_when: false
      failed_when: false

    - name: "STAGE: Cluster connectivity"
      ansible.builtin.debug:
        msg: "{{ 'PASS' if stage_cluster_info.rc == 0 else 'FAIL - cannot reach cluster' }}"

    # --- Argo CD ---

    - name: "STAGE: Check Argo CD applications"
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ stage_context }} -n argocd get applications
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.sync.status}{"\t"}{.status.health.status}{"\n"}{end}'
      register: stage_argocd_apps
      changed_when: false
      failed_when: false

    - name: "STAGE: Argo CD Applications"
      ansible.builtin.debug:
        msg: |
          {% for line in stage_argocd_apps.stdout_lines %}
          {% set parts = line.split('\t') %}
            {{ '  PASS' if parts[1] | default('') == 'Synced' and parts[2] | default('') == 'Healthy' else '  WARN' }} {{ parts[0] | default('unknown') }} (sync={{ parts[1] | default('?') }}, health={{ parts[2] | default('?') }})
          {% endfor %}

    - name: "STAGE: Check Argo CD server pod"
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ stage_context }} -n argocd
          get pods -l app.kubernetes.io/name=argocd-server
          -o jsonpath='{.items[0].status.phase}'
      register: stage_argocd_server
      changed_when: false
      failed_when: false

    # --- Traefik ---

    - name: "STAGE: Check Traefik"
      when: traefik_enabled | default(false) | bool
      block:
        - name: "STAGE: Check Traefik pods"
          ansible.builtin.command:
            cmd: >-
              kubectl --context {{ stage_context }} -n traefik
              get pods -l app.kubernetes.io/name=traefik
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\t"}{.status.containerStatuses[0].ready}{"\n"}{end}'
          register: stage_traefik_pods
          changed_when: false
          failed_when: false

        - name: "STAGE: Check Traefik LoadBalancer IP"
          ansible.builtin.shell:
            cmd: >-
              kubectl --context {{ stage_context }} -n traefik
              get svc -l app.kubernetes.io/name=traefik
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}'
          register: stage_traefik_ip
          changed_when: false
          failed_when: false

        - name: "STAGE: Traefik"
          ansible.builtin.debug:
            msg: |
              {% for line in stage_traefik_pods.stdout_lines %}
              {% set parts = line.split('\t') %}
                {{ 'PASS' if parts[1] | default('') == 'Running' and parts[2] | default('') == 'true' else 'FAIL' }} {{ parts[0] | default('unknown') }} ({{ parts[1] | default('?') }})
              {% endfor %}
                LoadBalancer IP: {{ stage_traefik_ip.stdout | default('NONE') }}

    # --- Falco ---

    - name: "STAGE: Check Falco pods"
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ stage_context }} get pods -A
          -l app.kubernetes.io/name=falco
          -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\t"}{.status.phase}{"\t"}{range .status.containerStatuses[*]}{.ready}{" "}{end}{"\n"}{end}'
      register: stage_falco_pods
      changed_when: false
      failed_when: false

    - name: "STAGE: Falco"
      ansible.builtin.debug:
        msg: |
          {% if stage_falco_pods.stdout_lines | length == 0 %}
            FAIL No Falco pods found
          {% else %}
          {% for line in stage_falco_pods.stdout_lines %}
          {% set parts = line.split('\t') %}
            {{ 'PASS' if parts[2] | default('') == 'Running' else 'FAIL' }} {{ parts[1] | default('unknown') }} ({{ parts[2] | default('?') }})
          {% endfor %}
          {% endif %}

    # --- Gatekeeper ---

    - name: "STAGE: Check Gatekeeper pods"
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ stage_context }} -n gatekeeper-system
          get pods -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\t"}{range .status.containerStatuses[*]}{.ready}{" "}{end}{"\n"}{end}'
      register: stage_gatekeeper_pods
      changed_when: false
      failed_when: false

    - name: "STAGE: Check Gatekeeper constraint violations"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }}
          get constraints -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.totalViolations}{"\n"}{end}' 2>/dev/null
      register: stage_gatekeeper_violations
      changed_when: false
      failed_when: false

    - name: "STAGE: Gatekeeper"
      ansible.builtin.debug:
        msg: |
          Pods:
          {% if stage_gatekeeper_pods.stdout_lines | length == 0 %}
            FAIL No Gatekeeper pods found
          {% else %}
          {% for line in stage_gatekeeper_pods.stdout_lines %}
          {% set parts = line.split('\t') %}
            {{ 'PASS' if parts[1] | default('') == 'Running' else 'FAIL' }} {{ parts[0] | default('unknown') }} ({{ parts[1] | default('?') }})
          {% endfor %}
          {% endif %}
          Constraint Violations:
          {% if stage_gatekeeper_violations.stdout_lines | length == 0 %}
            None (no constraints or no violations)
          {% else %}
          {% for line in stage_gatekeeper_violations.stdout_lines %}
          {% set parts = line.split('\t') %}
            {{ 'WARN' if (parts[1] | default('0') | int) > 0 else 'PASS' }} {{ parts[0] | default('unknown') }}: {{ parts[1] | default('0') }} violations
          {% endfor %}
          {% endif %}

    # --- Observability ---

    - name: "STAGE: Check Observability pods"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} get pods -A
          -l app.kubernetes.io/instance=observability-stage
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\t"}{range .status.containerStatuses[*]}{.ready}{" "}{end}{"\n"}{end}' 2>/dev/null
      register: stage_obs_pods
      changed_when: false
      failed_when: false

    - name: "STAGE: Check Prometheus targets"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} get servicemonitor -A
          -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}' 2>/dev/null
      register: stage_servicemonitors
      changed_when: false
      failed_when: false

    - name: "STAGE: Observability"
      ansible.builtin.debug:
        msg: |
          Pods:
          {% if stage_obs_pods.stdout_lines | length == 0 %}
            WARN No observability pods found (may still be deploying)
          {% else %}
          {% for line in stage_obs_pods.stdout_lines %}
          {% set parts = line.split('\t') %}
            {{ 'PASS' if parts[1] | default('') == 'Running' else 'WARN' }} {{ parts[0] | default('unknown') }} ({{ parts[1] | default('?') }})
          {% endfor %}
          {% endif %}
          ServiceMonitors:
          {% if stage_servicemonitors.stdout_lines | length == 0 %}
            WARN No ServiceMonitors found
          {% else %}
          {% for sm in stage_servicemonitors.stdout_lines %}
            OK {{ sm }}
          {% endfor %}
          {% endif %}

    # --- Ingress endpoints ---

    - name: "STAGE: Check Ingress endpoints"
      when: ingress_enabled | default(false) | bool
      block:
        - name: "STAGE: Check Argo CD URL"
          ansible.builtin.uri:
            url: "https://{{ argocd_hostname_stage }}"
            validate_certs: false
            timeout: 10
            status_code: [200, 302, 303]
          register: stage_argocd_url
          failed_when: false

        - name: "STAGE: Check Grafana URL"
          when: grafana_hostname_stage | default('') | length > 0
          ansible.builtin.uri:
            url: "https://{{ grafana_hostname_stage }}"
            validate_certs: false
            timeout: 10
            status_code: [200, 302, 303]
          register: stage_grafana_url
          failed_when: false

        - name: "STAGE: Check Prometheus URL"
          when: prometheus_hostname_stage | default('') | length > 0
          ansible.builtin.uri:
            url: "https://{{ prometheus_hostname_stage }}"
            validate_certs: false
            timeout: 10
            status_code: [200, 302, 303]
          register: stage_prometheus_url
          failed_when: false

        - name: "STAGE: Ingress Endpoints"
          ansible.builtin.debug:
            msg: |
              {{ 'PASS' if stage_argocd_url.status | default(0) in [200, 302, 303] else 'FAIL' }} Argo CD:     https://{{ argocd_hostname_stage }} ({{ stage_argocd_url.status | default('unreachable') }})
              {% if grafana_hostname_stage | default('') | length > 0 %}
              {{ 'PASS' if stage_grafana_url.status | default(0) in [200, 302, 303] else 'FAIL' }} Grafana:     https://{{ grafana_hostname_stage }} ({{ stage_grafana_url.status | default('unreachable') }})
              {% endif %}
              {% if prometheus_hostname_stage | default('') | length > 0 %}
              {{ 'PASS' if stage_prometheus_url.status | default(0) in [200, 302, 303] else 'FAIL' }} Prometheus:  https://{{ prometheus_hostname_stage }} ({{ stage_prometheus_url.status | default('unreachable') }})
              {% endif %}

    # ===========================================================
    # PROD CLUSTER
    # ===========================================================

    - name: "PROD: Check cluster connectivity"
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} cluster-info"
      register: prod_cluster_info
      changed_when: false
      failed_when: false

    - name: "PROD: Cluster connectivity"
      when: multi_cluster | bool
      ansible.builtin.debug:
        msg: "{{ 'PASS' if prod_cluster_info.rc == 0 else 'FAIL - cannot reach cluster' }}"

    - name: "PROD: Check Argo CD applications"
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ prod_context }} -n argocd get applications
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.sync.status}{"\t"}{.status.health.status}{"\n"}{end}'
      register: prod_argocd_apps
      changed_when: false
      failed_when: false

    - name: "PROD: Argo CD Applications"
      when: multi_cluster | bool
      ansible.builtin.debug:
        msg: |
          {% for line in prod_argocd_apps.stdout_lines %}
          {% set parts = line.split('\t') %}
            {{ '  PASS' if parts[2] | default('') == 'Healthy' else '  WARN' }} {{ parts[0] | default('unknown') }} (sync={{ parts[1] | default('?') }}, health={{ parts[2] | default('?') }})
          {% endfor %}

    - name: "PROD: Check Traefik"
      when: multi_cluster | bool and traefik_enabled | default(false) | bool
      block:
        - name: "PROD: Check Traefik pods"
          ansible.builtin.command:
            cmd: >-
              kubectl --context {{ prod_context }} -n traefik
              get pods -l app.kubernetes.io/name=traefik
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\t"}{.status.containerStatuses[0].ready}{"\n"}{end}'
          register: prod_traefik_pods
          changed_when: false
          failed_when: false

        - name: "PROD: Check Traefik LoadBalancer IP"
          ansible.builtin.shell:
            cmd: >-
              kubectl --context {{ prod_context }} -n traefik
              get svc -l app.kubernetes.io/name=traefik
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}'
          register: prod_traefik_ip
          changed_when: false
          failed_when: false

        - name: "PROD: Traefik"
          ansible.builtin.debug:
            msg: |
              {% for line in prod_traefik_pods.stdout_lines %}
              {% set parts = line.split('\t') %}
                {{ 'PASS' if parts[1] | default('') == 'Running' and parts[2] | default('') == 'true' else 'FAIL' }} {{ parts[0] | default('unknown') }} ({{ parts[1] | default('?') }})
              {% endfor %}
                LoadBalancer IP: {{ prod_traefik_ip.stdout | default('NONE') }}

    - name: "PROD: Check Falco pods"
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ prod_context }} get pods -A
          -l app.kubernetes.io/name=falco
          -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\t"}{.status.phase}{"\t"}{range .status.containerStatuses[*]}{.ready}{" "}{end}{"\n"}{end}'
      register: prod_falco_pods
      changed_when: false
      failed_when: false

    - name: "PROD: Falco"
      when: multi_cluster | bool
      ansible.builtin.debug:
        msg: |
          {% if prod_falco_pods.stdout_lines | length == 0 %}
            FAIL No Falco pods found
          {% else %}
          {% for line in prod_falco_pods.stdout_lines %}
          {% set parts = line.split('\t') %}
            {{ 'PASS' if parts[2] | default('') == 'Running' else 'FAIL' }} {{ parts[1] | default('unknown') }} ({{ parts[2] | default('?') }})
          {% endfor %}
          {% endif %}

    - name: "PROD: Check Gatekeeper pods"
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: >-
          kubectl --context {{ prod_context }} -n gatekeeper-system
          get pods -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\t"}{range .status.containerStatuses[*]}{.ready}{" "}{end}{"\n"}{end}'
      register: prod_gatekeeper_pods
      changed_when: false
      failed_when: false

    - name: "PROD: Gatekeeper"
      when: multi_cluster | bool
      ansible.builtin.debug:
        msg: |
          {% if prod_gatekeeper_pods.stdout_lines | length == 0 %}
            FAIL No Gatekeeper pods found
          {% else %}
          {% for line in prod_gatekeeper_pods.stdout_lines %}
          {% set parts = line.split('\t') %}
            {{ 'PASS' if parts[1] | default('') == 'Running' else 'FAIL' }} {{ parts[0] | default('unknown') }} ({{ parts[1] | default('?') }})
          {% endfor %}
          {% endif %}

    - name: "PROD: Ingress endpoints"
      when: multi_cluster | bool and ingress_enabled | default(false) | bool
      block:
        - name: "PROD: Check Argo CD URL"
          ansible.builtin.uri:
            url: "https://{{ argocd_hostname_prod }}"
            validate_certs: false
            timeout: 10
            status_code: [200, 302, 303]
          register: prod_argocd_url
          failed_when: false

        - name: "PROD: Check Grafana URL"
          when: grafana_hostname_prod | default('') | length > 0
          ansible.builtin.uri:
            url: "https://{{ grafana_hostname_prod }}"
            validate_certs: false
            timeout: 10
            status_code: [200, 302, 303]
          register: prod_grafana_url
          failed_when: false

        - name: "PROD: Check Prometheus URL"
          when: prometheus_hostname_prod | default('') | length > 0
          ansible.builtin.uri:
            url: "https://{{ prometheus_hostname_prod }}"
            validate_certs: false
            timeout: 10
            status_code: [200, 302, 303]
          register: prod_prometheus_url
          failed_when: false

        - name: "PROD: Ingress Endpoints"
          ansible.builtin.debug:
            msg: |
              {{ 'PASS' if prod_argocd_url.status | default(0) in [200, 302, 303] else 'FAIL' }} Argo CD:     https://{{ argocd_hostname_prod }} ({{ prod_argocd_url.status | default('unreachable') }})
              {% if grafana_hostname_prod | default('') | length > 0 %}
              {{ 'PASS' if prod_grafana_url.status | default(0) in [200, 302, 303] else 'FAIL' }} Grafana:     https://{{ grafana_hostname_prod }} ({{ prod_grafana_url.status | default('unreachable') }})
              {% endif %}
              {% if prometheus_hostname_prod | default('') | length > 0 %}
              {{ 'PASS' if prod_prometheus_url.status | default(0) in [200, 302, 303] else 'FAIL' }} Prometheus:  https://{{ prometheus_hostname_prod }} ({{ prod_prometheus_url.status | default('unreachable') }})
              {% endif %}

  post_tasks:
    - name: Health check complete
      ansible.builtin.debug:
        msg: |
          ================================================
           Health check complete.
          ================================================
