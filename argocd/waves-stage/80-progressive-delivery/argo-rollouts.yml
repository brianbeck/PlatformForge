# Argo Rollouts - Singleton (one per cluster)
# Deploys the controller + dashboard via Helm chart, plus RBAC manifests
# for the Traefik traffic router plugin and DevExForge integration.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-rollouts
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: "stage"
            project: "platform-stage"
  template:
    metadata:
      name: "argo-rollouts-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: platformforge
        platformforge/service: argo-rollouts
      annotations:
        argocd.argoproj.io/sync-wave: "80"
        notifications.argoproj.io/subscribe.on-health-degraded: ""
        notifications.argoproj.io/subscribe.on-sync-failed: ""
    spec:
      project: "{{project}}"
      sources:
        - repoURL: https://argoproj.github.io/argo-helm
          chart: argo-rollouts
          targetRevision: "2.40.9"
          helm:
            valueFiles:
              - $values/platform/argo-rollouts/base-values.yaml
              - "$values/platform/argo-rollouts/overlays/{{env}}/values.yaml"
        - repoURL: https://github.com/brianbeck/PlatformForge.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: argo-rollouts
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
---
# Argo Rollouts RBAC - sibling app deploying static manifests from
# platform/argo-rollouts/rbac/ (Traefik perms + DevExForge binding).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-rollouts-rbac
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: "stage"
            project: "platform-stage"
  template:
    metadata:
      name: "argo-rollouts-rbac-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: platformforge
        platformforge/service: argo-rollouts
      annotations:
        argocd.argoproj.io/sync-wave: "80"
    spec:
      project: "{{project}}"
      source:
        repoURL: https://github.com/brianbeck/PlatformForge.git
        targetRevision: main
        path: platform/argo-rollouts/rbac
        directory:
          recurse: false
      destination:
        server: https://kubernetes.default.svc
        namespace: argo-rollouts
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
---
# Argo Rollouts env overlay (dashboard IngressRoute + Certificate).
# Path is env-templated so stage IngressRoutes only land on the stage
# Argo CD and prod on prod.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-rollouts-overlay
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: "stage"
            project: "platform-stage"
  template:
    metadata:
      name: "argo-rollouts-overlay-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: platformforge
        platformforge/service: argo-rollouts
      annotations:
        argocd.argoproj.io/sync-wave: "85"
    spec:
      project: "{{project}}"
      source:
        repoURL: https://github.com/brianbeck/PlatformForge.git
        targetRevision: main
        path: "platform/argo-rollouts/overlays/{{env}}/manifests"
        directory:
          recurse: false
      destination:
        server: https://kubernetes.default.svc
        namespace: argo-rollouts
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
