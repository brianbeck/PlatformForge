apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platformforge
    platformforge/env: prod
    platformforge/service: falco
spec:
  project: platform-prod

  sources:
    - repoURL: https://falcosecurity.github.io/charts
      chart: falco
      targetRevision: "4.16.3"
      helm:
        valueFiles:
          - $values/platform/falco/base-values.yaml
          - $values/platform/falco/overlays/prod/values.yaml

    - repoURL: https://github.com/YOUR_ORG/PlatformForge.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/YOUR_ORG/PlatformForge.git
      targetRevision: main
      path: platform/falco/rules

  destination:
    server: https://kubernetes.default.svc
    namespace: falco-prod

  # Prod: manual sync only - no automated sync
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
