# Require resource limits on containers.
# Prevents unbounded resource consumption that can affect other workloads.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8scontainerlimits
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    description: Requires containers to have resource limits set
spec:
  crd:
    spec:
      names:
        kind: K8sContainerLimits
      validation:
        openAPIV3Schema:
          type: object
          properties:
            requireCPU:
              type: boolean
            requireMemory:
              type: boolean
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8scontainerlimits

        violation[{"msg": msg}] {
          container := input_containers[_]
          require_cpu
          not has_cpu_limit(container)
          msg := sprintf("Container <%v> has no CPU limit", [container.name])
        }

        violation[{"msg": msg}] {
          container := input_containers[_]
          require_memory
          not has_memory_limit(container)
          msg := sprintf("Container <%v> has no memory limit", [container.name])
        }

        input_containers[c] {
          c := input.review.object.spec.containers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.initContainers[_]
        }

        # Null-safe resource limit checks
        has_cpu_limit(container) {
          resources := object.get(container, "resources", {})
          limits := object.get(resources, "limits", {})
          limits.cpu
        }

        has_memory_limit(container) {
          resources := object.get(container, "resources", {})
          limits := object.get(resources, "limits", {})
          limits.memory
        }

        require_cpu {
          object.get(input, ["parameters", "requireCPU"], true) == true
        }

        require_memory {
          object.get(input, ["parameters", "requireMemory"], true) == true
        }
