---
# Install Argo CD and apply ApplicationSets for all platform services.
# Argo CD becomes the sole owner of platform service lifecycle.

# ============================================================
# COMPUTE ENVIRONMENT-SPECIFIC GENERATOR ENTRIES
# ============================================================

- name: Set namespace facts for Model A (single cluster)
  when: single_cluster | bool
  ansible.builtin.set_fact:
    falco_stage_namespace: "falco-stage"
    falco_prod_namespace: "falco-prod"
    monitoring_stage_namespace: "monitoring-stage"
    monitoring_prod_namespace: "monitoring-prod"

- name: Set namespace facts for Model B (multi-cluster)
  when: multi_cluster | bool
  ansible.builtin.set_fact:
    falco_stage_namespace: "falco"
    falco_prod_namespace: "falco"
    monitoring_stage_namespace: "monitoring"
    monitoring_prod_namespace: "monitoring"

# Build generator entries for STAGE Argo CD
- name: Build stage singleton generator entries
  ansible.builtin.set_fact:
    stage_singleton_envs:
      - env: stage
        project: platform-stage

- name: Build stage namespaced generator entries (Model A - includes prod)
  when: single_cluster | bool
  ansible.builtin.set_fact:
    stage_namespaced_envs:
      - env: stage
        project: platform-stage
        falco_namespace: "{{ falco_stage_namespace }}"
        monitoring_namespace: "{{ monitoring_stage_namespace }}"
      - env: prod
        project: platform-prod
        falco_namespace: "{{ falco_prod_namespace }}"
        monitoring_namespace: "{{ monitoring_prod_namespace }}"

- name: Build stage namespaced generator entries (Model B - stage only)
  when: multi_cluster | bool
  ansible.builtin.set_fact:
    stage_namespaced_envs:
      - env: stage
        project: platform-stage
        falco_namespace: "{{ falco_stage_namespace }}"
        monitoring_namespace: "{{ monitoring_stage_namespace }}"

- name: Build stage constraint generator entries
  ansible.builtin.set_fact:
    stage_constraint_envs:
      - env: stage
        project: platform-stage

# Build generator entries for PROD Argo CD (Model B only)
- name: Build prod singleton generator entries
  when: multi_cluster | bool
  ansible.builtin.set_fact:
    prod_singleton_envs:
      - env: prod
        project: platform-prod

- name: Build prod namespaced generator entries
  when: multi_cluster | bool
  ansible.builtin.set_fact:
    prod_namespaced_envs:
      - env: prod
        project: platform-prod
        falco_namespace: "{{ falco_prod_namespace }}"
        monitoring_namespace: "{{ monitoring_prod_namespace }}"

- name: Build prod constraint generator entries
  when: multi_cluster | bool
  ansible.builtin.set_fact:
    prod_constraint_envs:
      - env: prod
        project: platform-prod

# ============================================================
# ENVIRONMENT TARGETING
# ============================================================

- name: Set target environment flags
  ansible.builtin.set_fact:
    deploy_stage: "{{ target_env | default('all') in ['all', 'stage'] }}"
    deploy_prod: "{{ target_env | default('all') in ['all', 'prod'] }}"

# ============================================================
# INSTALL ARGO CD
# ============================================================

- name: Load notification secrets from vault
  when: notification_provider | default('none') != 'none'
  block:
    - name: Decrypt vault for notification config
      ansible.builtin.command:
        cmd: >-
          ansible-vault decrypt
          --vault-password-file {{ env_repo_path }}/vault/.vault_pass
          --output -
          {{ env_repo_path }}/vault/secrets.yml
      register: vault_for_notify
      changed_when: false
      no_log: true

    - name: Set notification secret facts
      ansible.builtin.set_fact:
        slack_webhook_stage: "{{ (vault_for_notify.stdout | from_yaml).slack_webhook_stage | default('') }}"
        slack_webhook_prod_critical: "{{ (vault_for_notify.stdout | from_yaml).slack_webhook_prod_critical | default('') }}"
        slack_webhook_prod_warnings: "{{ (vault_for_notify.stdout | from_yaml).slack_webhook_prod_warnings | default('') }}"
        slack_webhook_security: "{{ (vault_for_notify.stdout | from_yaml).slack_webhook_security | default('') }}"
        slack_webhook_vulnerabilities: "{{ (vault_for_notify.stdout | from_yaml).slack_webhook_vulnerabilities | default('') }}"
        smtp_password: "{{ (vault_for_notify.stdout | from_yaml).smtp_password | default('') }}"
      no_log: true

- name: Set empty notification facts when disabled
  when: notification_provider | default('none') == 'none'
  ansible.builtin.set_fact:
    slack_webhook_stage: ""
    slack_webhook_prod_critical: ""
    slack_webhook_prod_warnings: ""
    slack_webhook_security: ""
    slack_webhook_vulnerabilities: ""
    smtp_password: ""

- name: Add Argo CD Helm repository
  ansible.builtin.command:
    cmd: "helm repo add argo {{ argocd_helm_repo }}"
  register: result
  changed_when: "'has been added' in result.stdout"
  failed_when: false

- name: Update Helm repositories
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Template Argo CD Helm values (stage)
  when: deploy_stage | bool
  ansible.builtin.template:
    src: values.yml.j2
    dest: /tmp/argocd-values-stage.yml
    mode: "0644"
  vars:
    argocd_env: stage
    argocd_server_insecure: true

- name: Install Argo CD (stage)
  when: deploy_stage | bool
  ansible.builtin.command:
    cmd: >-
      helm upgrade --install argocd argo/argo-cd
      --namespace {{ argocd_namespace }} --create-namespace
      --kube-context {{ stage_context }}
      --version {{ argocd_chart_version }}
      --values /tmp/argocd-values-stage.yml
      --wait --timeout 5m
  register: result
  changed_when: "'has been upgraded' in result.stdout or 'has been installed' in result.stdout"

- name: Wait for Argo CD server (stage)
  when: deploy_stage | bool
  ansible.builtin.command:
    cmd: >-
      kubectl --context {{ stage_context }} -n {{ argocd_namespace }}
      rollout status deployment/argocd-server --timeout=300s
  changed_when: false

- name: Template Argo CD Helm values (prod)
  when: multi_cluster | bool and deploy_prod | bool
  ansible.builtin.template:
    src: values.yml.j2
    dest: /tmp/argocd-values-prod.yml
    mode: "0644"
  vars:
    argocd_env: prod
    argocd_server_insecure: true

- name: Install Argo CD (prod)
  when: multi_cluster | bool and deploy_prod | bool
  ansible.builtin.command:
    cmd: >-
      helm upgrade --install argocd argo/argo-cd
      --namespace {{ argocd_namespace }} --create-namespace
      --kube-context {{ prod_context }}
      --version {{ argocd_chart_version }}
      --values /tmp/argocd-values-prod.yml
      --wait --timeout 5m
  register: result
  changed_when: "'has been upgraded' in result.stdout or 'has been installed' in result.stdout"

- name: Wait for Argo CD server (prod)
  when: multi_cluster | bool and deploy_prod | bool
  ansible.builtin.command:
    cmd: >-
      kubectl --context {{ prod_context }} -n {{ argocd_namespace }}
      rollout status deployment/argocd-server --timeout=300s
  changed_when: false

# ============================================================
# REGISTER ENV REPO WITH ARGO CD
# Argo CD needs credentials to read the private env repo.
# ============================================================

- name: Load GitHub PAT from vault
  block:
    - name: Decrypt vault for GitHub PAT
      ansible.builtin.command:
        cmd: >-
          ansible-vault decrypt
          --vault-password-file {{ env_repo_path }}/vault/.vault_pass
          --output -
          {{ env_repo_path }}/vault/secrets.yml
      register: vault_for_pat
      changed_when: false
      no_log: true

    - name: Set GitHub PAT fact
      ansible.builtin.set_fact:
        github_pat: "{{ (vault_for_pat.stdout | from_yaml).github_pat | default('') }}"
      no_log: true

- name: Apply env repo credential to Argo CD (stage)
  when: github_pat | default('') | length > 0 and deploy_stage | bool
  block:
    - name: Template repo secret (stage)
      ansible.builtin.template:
        src: argocd-repo-secret.yaml.j2
        dest: /tmp/argocd-repo-secret-stage.yaml
        mode: "0600"

    - name: Apply repo secret (stage)
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f /tmp/argocd-repo-secret-stage.yaml"
      changed_when: true

    - name: Clean up repo secret (stage)
      ansible.builtin.file:
        path: /tmp/argocd-repo-secret-stage.yaml
        state: absent

- name: Apply env repo credential to Argo CD (prod)
  when: github_pat | default('') | length > 0 and multi_cluster | bool and deploy_prod | bool
  block:
    - name: Template repo secret (prod)
      ansible.builtin.template:
        src: argocd-repo-secret.yaml.j2
        dest: /tmp/argocd-repo-secret-prod.yaml
        mode: "0600"

    - name: Apply repo secret (prod)
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f /tmp/argocd-repo-secret-prod.yaml"
      changed_when: true

    - name: Clean up repo secret (prod)
      ansible.builtin.file:
        path: /tmp/argocd-repo-secret-prod.yaml
        state: absent

# ============================================================
# TEMPLATE APPPROJECTS + APPLICATIONSETS
# Stage goes to argocd/waves-stage/, Prod to argocd/waves-prod/
# Both are committed to Git for full GitOps compliance.
# ============================================================

- name: Define secrets ApplicationSet
  ansible.builtin.set_fact:
    appset_secrets:
      - src: "-10-sealed-secrets.yml.j2"
        dest: "-10-secrets/sealed-secrets.yml"
  when: secrets_strategy | default('sealed-secrets') == 'sealed-secrets'

- name: Define secrets ApplicationSet (external)
  ansible.builtin.set_fact:
    appset_secrets:
      - src: "-10-external-secrets.yml.j2"
        dest: "-10-secrets/external-secrets.yml"
  when: secrets_strategy | default('sealed-secrets') == 'external-secrets'

- name: Define ApplicationSet wave list
  ansible.builtin.set_fact:
    appset_waves: >-
      {{ appset_secrets + [
        {"src": "05-cert-manager.yml.j2", "dest": "05-cert-manager/cert-manager.yml"},
        {"src": "10-traefik.yml.j2", "dest": "10-networking/traefik.yml"},
        {"src": "20-observability.yml.j2", "dest": "20-observability/kube-prometheus-stack.yml"},
        {"src": "30-gatekeeper-core.yml.j2", "dest": "30-policy-core/gatekeeper-core.yml"},
        {"src": "40-gatekeeper-templates.yml.j2", "dest": "40-policy-templates/gatekeeper-templates.yml"},
        {"src": "50-gatekeeper-constraints.yml.j2", "dest": "50-policy-constraints/gatekeeper-constraints.yml"},
        {"src": "60-falco.yml.j2", "dest": "60-runtime-security/falco.yml"},
        {"src": "70-trivy-operator.yml.j2", "dest": "70-vulnerability-scanning/trivy-operator.yml"},
        {"src": "80-argo-rollouts.yml.j2", "dest": "80-progressive-delivery/argo-rollouts.yml"}
      ] }}

- name: Template AppProjects to argocd/root/
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ env_repo_path }}/argocd/root/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: "project-stage.yml.j2", dest: "platform-project-stage.yml" }
    - { src: "project-prod.yml.j2", dest: "platform-project-prod.yml" }

- name: Install Gateway API CRDs (stage)
  when: deploy_stage | bool
  ansible.builtin.command:
    cmd: >-
      kubectl --context {{ stage_context }} apply -f
      https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.0/standard-install.yaml
  register: gw_crd_stage
  changed_when: "'created' in gw_crd_stage.stdout or 'configured' in gw_crd_stage.stdout"

- name: Install Gateway API CRDs (prod)
  when: multi_cluster | bool and deploy_prod | bool
  ansible.builtin.command:
    cmd: >-
      kubectl --context {{ prod_context }} apply -f
      https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.0/standard-install.yaml
  register: gw_crd_prod
  changed_when: "'created' in gw_crd_prod.stdout or 'configured' in gw_crd_prod.stdout"

- name: Ensure wave directories exist (stage + prod)
  ansible.builtin.file:
    path: "{{ item.0 }}/{{ item.1.dest | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ [env_repo_path + '/argocd/waves-stage', env_repo_path + '/argocd/waves-prod'] | product(appset_waves) | list }}"

- name: Template stage ApplicationSets to argocd/waves-stage/
  ansible.builtin.template:
    src: "appsets/{{ item.src }}"
    dest: "{{ env_repo_path }}/argocd/waves-stage/{{ item.dest }}"
    mode: "0644"
  vars:
    singleton_envs: "{{ stage_singleton_envs }}"
    namespaced_envs: "{{ stage_namespaced_envs }}"
    constraint_envs: "{{ stage_constraint_envs }}"
  loop: "{{ appset_waves }}"

- name: Template prod ApplicationSets to argocd/waves-prod/
  ansible.builtin.template:
    src: "appsets/{{ item.src }}"
    dest: "{{ env_repo_path }}/argocd/waves-prod/{{ item.dest }}"
    mode: "0644"
  vars:
    singleton_envs: "{{ prod_singleton_envs | default(stage_singleton_envs) }}"
    namespaced_envs: "{{ prod_namespaced_envs | default(stage_namespaced_envs) }}"
    constraint_envs: "{{ prod_constraint_envs | default(stage_constraint_envs) }}"
  loop: "{{ appset_waves }}"

# ============================================================
# APPLY TO CLUSTERS
# ============================================================

- name: Apply stage AppProjects
  when: deploy_stage | bool
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} apply -f {{ env_repo_path }}/argocd/root/"
  register: result
  changed_when: "'configured' in result.stdout or 'created' in result.stdout"

- name: Apply stage ApplicationSets
  when: deploy_stage | bool
  ansible.builtin.shell:
    cmd: "find {{ env_repo_path }}/argocd/waves-stage/ -name '*.yml' -exec kubectl --context {{ stage_context }} apply -f {} \\;"
  register: result
  changed_when: true

- name: Apply prod AppProjects
  when: multi_cluster | bool and deploy_prod | bool
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} apply -f {{ env_repo_path }}/argocd/root/"
  register: result
  changed_when: "'configured' in result.stdout or 'created' in result.stdout"

- name: Apply prod ApplicationSets
  when: multi_cluster | bool and deploy_prod | bool
  ansible.builtin.shell:
    cmd: "find {{ env_repo_path }}/argocd/waves-prod/ -name '*.yml' -exec kubectl --context {{ prod_context }} apply -f {} \\;"
  register: result
  changed_when: true

# ============================================================
# WAIT FOR PLATFORM TO BE HEALTHY
# ============================================================

- name: Wait for Argo CD to process ApplicationSets
  ansible.builtin.pause:
    seconds: 15

# ============================================================
# APPLY ARGO CD INGRESSROUTES (after Traefik deploys)
# ============================================================

- name: Wait for cert-manager webhook to be ready (stage)
  when: ingress_enabled | default(false) | bool and deploy_stage | bool
  ansible.builtin.shell:
    cmd: >-
      kubectl --context {{ stage_context }} -n cert-manager get pods
      -l app.kubernetes.io/component=webhook -o jsonpath='{.items[0].status.phase}'
  register: cm_webhook_check
  changed_when: false
  retries: 20
  delay: 15
  until: cm_webhook_check.stdout | trim == 'Running'
  failed_when: false

- name: Pause for cert-manager webhook TLS initialization
  when: ingress_enabled | default(false) | bool
  ansible.builtin.pause:
    seconds: 30

# ============================================================
# SEAL AND APPLY CLOUDFLARE API TOKEN
# ============================================================

- name: Load Cloudflare token from vault
  when: ingress_enabled | default(false) | bool
  ansible.builtin.command:
    cmd: >-
      ansible-vault decrypt
      --vault-password-file {{ env_repo_path }}/vault/.vault_pass
      --output -
      {{ env_repo_path }}/vault/secrets.yml
  register: vault_for_cf
  changed_when: false
  no_log: true

- name: Set Cloudflare token fact
  when: ingress_enabled | default(false) | bool
  ansible.builtin.set_fact:
    cloudflare_api_token: "{{ (vault_for_cf.stdout | from_yaml).cloudflare_api_token | default('') }}"
  no_log: true

- name: Check if stage sealed secret already exists
  ansible.builtin.stat:
    path: "{{ env_repo_path }}/overlays/cert-manager/stage/cloudflare-sealed-secret.yaml"
  register: stage_sealed_secret_file

- name: Create and seal Cloudflare secret (stage)
  when: ingress_enabled | default(false) | bool and cloudflare_api_token | length > 0 and deploy_stage | bool and not stage_sealed_secret_file.stat.exists
  block:
    - name: Wait for Sealed Secrets controller (stage)
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} -n sealed-secrets get pods
          -l app.kubernetes.io/name=sealed-secrets -o jsonpath='{.items[0].status.phase}'
      register: ss_check
      changed_when: false
      retries: 20
      delay: 10
      until: ss_check.stdout | trim == 'Running'

    - name: Ensure cert-manager namespace exists (stage)
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} create namespace cert-manager"
      register: ns_result
      changed_when: "'created' in ns_result.stdout"
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

    - name: Create plaintext secret YAML
      ansible.builtin.copy:
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflare-api-token
            namespace: cert-manager
          type: Opaque
          stringData:
            api-token: "{{ cloudflare_api_token }}"
        dest: /tmp/cf-secret-plain.yaml
        mode: "0600"
      no_log: true

    - name: Seal secret for stage
      ansible.builtin.shell:
        cmd: >-
          kubeseal --controller-name=sealed-secrets-controller
          --controller-namespace=sealed-secrets
          --context {{ stage_context }}
          --format yaml < /tmp/cf-secret-plain.yaml
      register: sealed_stage
      changed_when: false
      no_log: true

    - name: Write sealed secret for stage
      ansible.builtin.copy:
        content: "{{ sealed_stage.stdout }}"
        dest: "{{ env_repo_path }}/overlays/cert-manager/stage/cloudflare-sealed-secret.yaml"
        mode: "0644"

    - name: Apply sealed secret to stage
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f {{ env_repo_path }}/overlays/cert-manager/stage/cloudflare-sealed-secret.yaml"
      changed_when: true

- name: Check if prod sealed secret already exists
  ansible.builtin.stat:
    path: "{{ env_repo_path }}/overlays/cert-manager/prod/cloudflare-sealed-secret.yaml"
  register: prod_sealed_secret_file

- name: Create and seal Cloudflare secret (prod)
  when: ingress_enabled | default(false) | bool and multi_cluster | bool and cloudflare_api_token | length > 0 and deploy_prod | bool and not prod_sealed_secret_file.stat.exists
  block:
    - name: Wait for Sealed Secrets controller (prod)
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} -n sealed-secrets get pods
          -l app.kubernetes.io/name=sealed-secrets -o jsonpath='{.items[0].status.phase}'
      register: ss_check_prod
      changed_when: false
      retries: 20
      delay: 10
      until: ss_check_prod.stdout | trim == 'Running'

    - name: Ensure cert-manager namespace exists (prod)
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} create namespace cert-manager"
      register: ns_result
      changed_when: "'created' in ns_result.stdout"
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

    - name: Seal secret for prod
      ansible.builtin.shell:
        cmd: >-
          kubeseal --controller-name=sealed-secrets-controller
          --controller-namespace=sealed-secrets
          --context {{ prod_context }}
          --format yaml < /tmp/cf-secret-plain.yaml
      register: sealed_prod
      changed_when: false
      no_log: true

    - name: Write sealed secret for prod
      ansible.builtin.copy:
        content: "{{ sealed_prod.stdout }}"
        dest: "{{ env_repo_path }}/overlays/cert-manager/prod/cloudflare-sealed-secret.yaml"
        mode: "0644"

    - name: Apply sealed secret to prod
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f {{ env_repo_path }}/overlays/cert-manager/prod/cloudflare-sealed-secret.yaml"
      changed_when: true

- name: Clean up plaintext secret
  ansible.builtin.file:
    path: /tmp/cf-secret-plain.yaml
    state: absent

- name: Wait for Gateway API CRDs to be available (stage)
  when: ingress_enabled | default(false) | bool and deploy_stage | bool
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} get crd httproutes.gateway.networking.k8s.io"
  register: gw_crd_check
  changed_when: false
  retries: 30
  delay: 10
  until: gw_crd_check.rc == 0

- name: Apply Traefik Gateway (stage)
  when: ingress_enabled | default(false) | bool and deploy_stage | bool
  block:
    - name: Template stage Traefik Gateway
      ansible.builtin.template:
        src: gateway/traefik-gateway.yaml.j2
        dest: /tmp/traefik-gw-stage.yml
        mode: "0644"

    - name: Apply stage Traefik Gateway
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f /tmp/traefik-gw-stage.yml"
      register: gw_stage_result
      changed_when: true
      retries: 5
      delay: 15
      until: gw_stage_result.rc == 0

- name: Apply Argo CD HTTPRoute (stage)
  when: ingress_enabled | default(false) | bool and argocd_hostname_stage | default('') | length > 0 and deploy_stage | bool
  block:
    - name: Template stage Argo CD HTTPRoute
      ansible.builtin.template:
        src: gateway-routes/argocd.yml.j2
        dest: /tmp/argocd-route-stage.yml
        mode: "0644"
      vars:
        argocd_hostname: "{{ argocd_hostname_stage }}"

    - name: Apply stage Argo CD HTTPRoute
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f /tmp/argocd-route-stage.yml"
      register: route_stage_result
      changed_when: true
      retries: 5
      delay: 15
      until: route_stage_result.rc == 0

- name: Wait for Gateway API CRDs to be available (prod)
  when: ingress_enabled | default(false) | bool and multi_cluster | bool and deploy_prod | bool
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} get crd httproutes.gateway.networking.k8s.io"
  register: gw_crd_check_prod
  changed_when: false
  retries: 30
  delay: 10
  until: gw_crd_check_prod.rc == 0

- name: Apply Traefik Gateway (prod)
  when: ingress_enabled | default(false) | bool and multi_cluster | bool and deploy_prod | bool
  block:
    - name: Template prod Traefik Gateway
      ansible.builtin.template:
        src: gateway/traefik-gateway.yaml.j2
        dest: /tmp/traefik-gw-prod.yml
        mode: "0644"

    - name: Apply prod Traefik Gateway
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f /tmp/traefik-gw-prod.yml"
      register: gw_prod_result
      changed_when: true
      retries: 5
      delay: 15
      until: gw_prod_result.rc == 0

- name: Apply Argo CD HTTPRoute (prod)
  when: ingress_enabled | default(false) | bool and multi_cluster | bool and argocd_hostname_prod | default('') | length > 0 and deploy_prod | bool
  block:
    - name: Template prod Argo CD HTTPRoute
      ansible.builtin.template:
        src: gateway-routes/argocd.yml.j2
        dest: /tmp/argocd-route-prod.yml
        mode: "0644"
      vars:
        argocd_hostname: "{{ argocd_hostname_prod }}"

    - name: Apply prod Argo CD HTTPRoute
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f /tmp/argocd-route-prod.yml"
      register: route_prod_result
      changed_when: true
      retries: 5
      delay: 15
      until: route_prod_result.rc == 0

# ============================================================
# TEMPLATE CERT-MANAGER AND OBSERVABILITY FILES
# These go into platform/ and get picked up by Argo CD from Git
# ============================================================

- name: Template cert-manager ClusterIssuer (stage)
  when: ingress_enabled | default(false) | bool
  ansible.builtin.template:
    src: cert-manager/cluster-issuer.yaml.j2
    dest: "{{ env_repo_path }}/overlays/cert-manager/stage/cluster-issuer.yaml"
    mode: "0644"

- name: Template cert-manager ClusterIssuer (prod)
  when: ingress_enabled | default(false) | bool
  ansible.builtin.template:
    src: cert-manager/cluster-issuer.yaml.j2
    dest: "{{ env_repo_path }}/overlays/cert-manager/prod/cluster-issuer.yaml"
    mode: "0644"

- name: Apply Alertmanager config secret (stage)
  when: notification_provider | default('none') != 'none' and deploy_stage | bool
  block:
    - name: Template Alertmanager secret (stage)
      ansible.builtin.template:
        src: observability/alertmanager-secret.yaml.j2
        dest: /tmp/alertmanager-secret-stage.yaml
        mode: "0600"
      vars:
        env_name: stage
        monitoring_namespace: "{{ monitoring_stage_namespace | default('monitoring') }}"

    - name: Apply Alertmanager secret (stage)
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} apply -f /tmp/alertmanager-secret-stage.yaml"
      changed_when: true

    - name: Clean up Alertmanager secret file (stage)
      ansible.builtin.file:
        path: /tmp/alertmanager-secret-stage.yaml
        state: absent

- name: Apply Alertmanager config secret (prod)
  when: notification_provider | default('none') != 'none' and multi_cluster | bool and deploy_prod | bool
  block:
    - name: Template Alertmanager secret (prod)
      ansible.builtin.template:
        src: observability/alertmanager-secret.yaml.j2
        dest: /tmp/alertmanager-secret-prod.yaml
        mode: "0600"
      vars:
        env_name: prod
        monitoring_namespace: "{{ monitoring_prod_namespace | default('monitoring') }}"

    - name: Apply Alertmanager secret (prod)
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} apply -f /tmp/alertmanager-secret-prod.yaml"
      changed_when: true

    - name: Clean up Alertmanager secret file (prod)
      ansible.builtin.file:
        path: /tmp/alertmanager-secret-prod.yaml
        state: absent

- name: Template observability HTTPRoutes (stage)
  when: ingress_enabled | default(false) | bool and grafana_hostname_stage | default('') | length > 0 and deploy_stage | bool
  ansible.builtin.template:
    src: observability/httproutes.yaml.j2
    dest: "{{ env_repo_path }}/overlays/observability/stage/httproutes.yaml"
    mode: "0644"
  vars:
    grafana_hostname: "{{ grafana_hostname_stage }}"
    prometheus_hostname: "{{ prometheus_hostname_stage }}"
    alertmanager_hostname: "{{ alertmanager_hostname_stage | default('') }}"
    env_name: stage

- name: Template Alertmanager URL values (stage)
  when: ingress_enabled | default(false) | bool and alertmanager_hostname_stage | default('') | length > 0 and deploy_stage | bool
  ansible.builtin.template:
    src: observability/alertmanager-url-values.yaml.j2
    dest: "{{ env_repo_path }}/overlays/observability/stage/alertmanager-url-values.yaml"
    mode: "0644"
  vars:
    alertmanager_hostname: "{{ alertmanager_hostname_stage }}"

- name: Template observability HTTPRoutes (prod)
  when: ingress_enabled | default(false) | bool and grafana_hostname_prod | default('') | length > 0 and deploy_prod | bool
  ansible.builtin.template:
    src: observability/httproutes.yaml.j2
    dest: "{{ env_repo_path }}/overlays/observability/prod/httproutes.yaml"
    mode: "0644"
  vars:
    grafana_hostname: "{{ grafana_hostname_prod }}"
    prometheus_hostname: "{{ prometheus_hostname_prod }}"
    alertmanager_hostname: "{{ alertmanager_hostname_prod | default('') }}"
    env_name: prod

- name: Template Alertmanager URL values (prod)
  when: ingress_enabled | default(false) | bool and alertmanager_hostname_prod | default('') | length > 0 and deploy_prod | bool
  ansible.builtin.template:
    src: observability/alertmanager-url-values.yaml.j2
    dest: "{{ env_repo_path }}/overlays/observability/prod/alertmanager-url-values.yaml"
    mode: "0644"
  vars:
    alertmanager_hostname: "{{ alertmanager_hostname_prod }}"

- name: Ensure Argo Rollouts overlay directories exist
  when: ingress_enabled | default(false) | bool
  ansible.builtin.file:
    path: "{{ env_repo_path }}/overlays/argo-rollouts/{{ item }}/manifests"
    state: directory
    mode: "0755"
  loop:
    - stage
    - prod

- name: Template Argo Rollouts dashboard HTTPRoute (stage)
  when: ingress_enabled | default(false) | bool and rollouts_hostname_stage | default('') | length > 0 and deploy_stage | bool
  ansible.builtin.template:
    src: argo-rollouts/httproute.yaml.j2
    dest: "{{ env_repo_path }}/overlays/argo-rollouts/stage/manifests/httproute.yaml"
    mode: "0644"
  vars:
    rollouts_hostname: "{{ rollouts_hostname_stage }}"
    env_name: stage

- name: Template Argo Rollouts dashboard HTTPRoute (prod)
  when: ingress_enabled | default(false) | bool and rollouts_hostname_prod | default('') | length > 0 and deploy_prod | bool
  ansible.builtin.template:
    src: argo-rollouts/httproute.yaml.j2
    dest: "{{ env_repo_path }}/overlays/argo-rollouts/prod/manifests/httproute.yaml"
    mode: "0644"
  vars:
    rollouts_hostname: "{{ rollouts_hostname_prod }}"
    env_name: prod

- name: Display deployment progress
  ansible.builtin.debug:
    msg: |
      Argo CD is now deploying all platform services via ApplicationSets.
      Sync wave order: Secrets(-10) -> Traefik(10) -> Observability(20) -> Gatekeeper(30-50) -> Falco(60) -> Trivy(70) -> Argo Rollouts(80)

      Monitor progress:
        kubectl --context {{ stage_context }} -n argocd get applications -w

# ============================================================
# PI-HOLE DNS (if Traefik + ingress enabled)
# ============================================================

- name: Wait for Traefik to get LoadBalancer IP (stage)
  when: ingress_enabled | default(false) | bool and pihole_enabled | default(false) | bool and deploy_stage | bool
  ansible.builtin.shell:
    cmd: >-
      kubectl --context {{ stage_context }} -n traefik
      get svc -l app.kubernetes.io/name=traefik
      -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}'
  register: traefik_ip_stage_raw
  changed_when: false
  retries: 30
  delay: 15
  until: traefik_ip_stage_raw.stdout | trim | length > 0

- name: Wait for Traefik to get LoadBalancer IP (prod)
  when: ingress_enabled | default(false) | bool and pihole_enabled | default(false) | bool and multi_cluster | bool and deploy_prod | bool
  ansible.builtin.shell:
    cmd: >-
      kubectl --context {{ prod_context }} -n traefik
      get svc -l app.kubernetes.io/name=traefik
      -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}'
  register: traefik_ip_prod_raw
  changed_when: false
  retries: 30
  delay: 15
  until: traefik_ip_prod_raw.stdout | trim | length > 0

- name: Set Traefik IP facts
  when: ingress_enabled | default(false) | bool and pihole_enabled | default(false) | bool
  ansible.builtin.set_fact:
    traefik_ip_stage: "{{ traefik_ip_stage_raw.stdout | default('') | trim }}"
    traefik_ip_prod: "{{ (traefik_ip_prod_raw.stdout | default('') | trim) if multi_cluster | bool else (traefik_ip_stage_raw.stdout | default('') | trim) }}"

# ============================================================
# CLEANUP
# ============================================================

- name: Clean up temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/argocd-values-stage.yml
    - /tmp/argocd-values-prod.yml
    - /tmp/traefik-gw-stage.yml
    - /tmp/traefik-gw-prod.yml
    - /tmp/argocd-route-stage.yml
    - /tmp/argocd-route-prod.yml

- name: Display summary
  ansible.builtin.debug:
    msg: |
      ================================================
       Argo CD Installed -- Platform Deploying
      ================================================

      Argo CD is deploying all platform services.
      This takes 5-10 minutes for the full stack.

      Argo CD admin password:
        Stage: kubectl --context {{ stage_context }} -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
      {% if multi_cluster | bool %}
        Prod:  kubectl --context {{ prod_context }} -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
      {% endif %}

      {% if argocd_hostname_stage | default('') | length > 0 %}
      URLs:
        Stage Argo CD: https://{{ argocd_hostname_stage }}
      {% if multi_cluster | bool %}
        Prod Argo CD:  https://{{ argocd_hostname_prod }}
      {% endif %}
      {% endif %}

      Next steps:
        1. git add argocd/ && git commit -m "Generate ApplicationSets" && git push
        2. Monitor: kubectl -n argocd get applications -w
        3. Verify: ansible-playbook playbooks/healthcheck.yml

      ================================================
