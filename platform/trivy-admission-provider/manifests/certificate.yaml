# Self-signed CA and server certificate for the Trivy admission provider.
# Required by Gatekeeper External Data API (TLS 1.3 minimum).
# Uses a local self-signed CA (not Let's Encrypt) since this is
# internal cluster-only communication.
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: trivy-admission-provider-ca
  namespace: gatekeeper-system
  labels:
    app.kubernetes.io/name: trivy-admission-provider
    app.kubernetes.io/part-of: platformforge
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trivy-admission-provider-ca
  namespace: gatekeeper-system
  labels:
    app.kubernetes.io/name: trivy-admission-provider
    app.kubernetes.io/part-of: platformforge
spec:
  isCA: true
  commonName: trivy-admission-provider-ca
  secretName: trivy-admission-provider-ca
  duration: 87600h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: trivy-admission-provider-ca
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: trivy-admission-provider-issuer
  namespace: gatekeeper-system
  labels:
    app.kubernetes.io/name: trivy-admission-provider
    app.kubernetes.io/part-of: platformforge
spec:
  ca:
    secretName: trivy-admission-provider-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trivy-admission-provider-tls
  namespace: gatekeeper-system
  labels:
    app.kubernetes.io/name: trivy-admission-provider
    app.kubernetes.io/part-of: platformforge
spec:
  secretName: trivy-admission-provider-tls
  duration: 8760h
  renewBefore: 720h
  isCA: false
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
  dnsNames:
    - trivy-admission-provider
    - trivy-admission-provider.gatekeeper-system
    - trivy-admission-provider.gatekeeper-system.svc
    - trivy-admission-provider.gatekeeper-system.svc.cluster.local
  issuerRef:
    name: trivy-admission-provider-issuer
    kind: Issuer
