---
# Install and configure Argo CD via Helm, then apply AppProjects and Applications.

# --- Add Helm repos ---

- name: Add Argo CD Helm repository
  ansible.builtin.command:
    cmd: "helm repo add argo {{ argocd_helm_repo }}"
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"
  failed_when: false

- name: Update Helm repositories
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

# --- Compute namespace values based on environment model ---

- name: Set namespace facts for Model A (single cluster)
  when: single_cluster | bool
  ansible.builtin.set_fact:
    falco_stage_namespace: "falco-stage"
    falco_prod_namespace: "falco-prod"
    gatekeeper_stage_namespace: "gatekeeper-system"
    gatekeeper_prod_namespace: "gatekeeper-system"
    monitoring_stage_namespace: "monitoring-stage"
    monitoring_prod_namespace: "monitoring-prod"

- name: Set namespace facts for Model B (multi-cluster)
  when: multi_cluster | bool
  ansible.builtin.set_fact:
    falco_stage_namespace: "falco"
    falco_prod_namespace: "falco"
    gatekeeper_stage_namespace: "gatekeeper-system"
    gatekeeper_prod_namespace: "gatekeeper-system"
    monitoring_stage_namespace: "monitoring"
    monitoring_prod_namespace: "monitoring"

# --- Template all Argo CD manifests ---

- name: Template AppProjects
  ansible.builtin.template:
    src: "projects/{{ item }}.j2"
    dest: "{{ playbook_dir }}/../../argocd/projects/{{ item }}"
    mode: "0644"
  loop:
    - platform-stage.yml
    - platform-prod.yml

- name: Build stage application list
  ansible.builtin.set_fact:
    stage_apps:
      - falco.yml
      - gatekeeper-core.yml
      - gatekeeper-templates.yml
      - gatekeeper-constraints.yml
      - observability.yml
    stage_apps_traefik: "{{ ['traefik.yml'] if traefik_enabled | default(false) | bool else [] }}"

- name: Build prod application list
  ansible.builtin.set_fact:
    prod_apps:
      - falco.yml
      - gatekeeper-core.yml
      - gatekeeper-templates.yml
      - gatekeeper-constraints.yml
      - observability.yml
    prod_apps_traefik: "{{ ['traefik.yml'] if traefik_enabled | default(false) | bool else [] }}"

- name: Template stage Applications
  ansible.builtin.template:
    src: "apps/stage/{{ item }}.j2"
    dest: "{{ playbook_dir }}/../../argocd/apps/stage/{{ item }}"
    mode: "0644"
  loop: "{{ stage_apps + stage_apps_traefik }}"

- name: Template prod Applications
  ansible.builtin.template:
    src: "apps/prod/{{ item }}.j2"
    dest: "{{ playbook_dir }}/../../argocd/apps/prod/{{ item }}"
    mode: "0644"
  loop: "{{ prod_apps + prod_apps_traefik }}"

# --- Template ingress values for observability (if enabled) ---

- name: Template observability ingress values (stage)
  when: ingress_enabled | default(false) | bool
  ansible.builtin.template:
    src: "observability/overlays/stage/ingress-values.yaml.j2"
    dest: "{{ playbook_dir }}/../../platform/observability/overlays/stage/ingress-values.yaml"
    mode: "0644"

- name: Template observability ingress values (prod)
  when: ingress_enabled | default(false) | bool
  ansible.builtin.template:
    src: "observability/overlays/prod/ingress-values.yaml.j2"
    dest: "{{ playbook_dir }}/../../platform/observability/overlays/prod/ingress-values.yaml"
    mode: "0644"

# --- Clean up any dangling webhooks from previous deployments ---

- name: Remove dangling Gatekeeper webhooks (stage)
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} delete validatingwebhookconfiguration {{ item }} --ignore-not-found"
  loop:
    - gatekeeper-validating-webhook-configuration
  changed_when: false
  failed_when: false

- name: Remove dangling Gatekeeper labeled webhooks (stage)
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} delete validatingwebhookconfiguration -l gatekeeper.sh/system=yes --ignore-not-found"
  changed_when: false
  failed_when: false

- name: Remove dangling Gatekeeper webhooks (prod)
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} delete validatingwebhookconfiguration {{ item }} --ignore-not-found"
  loop:
    - gatekeeper-validating-webhook-configuration
  changed_when: false
  failed_when: false

- name: Remove dangling Gatekeeper labeled webhooks (prod)
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} delete validatingwebhookconfiguration -l gatekeeper.sh/system=yes --ignore-not-found"
  changed_when: false
  failed_when: false

# --- Install Argo CD to stage context ---

- name: Create Argo CD namespace (stage)
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} create namespace {{ argocd_namespace }}"
  register: ns_create_stage
  changed_when: "'created' in ns_create_stage.stdout"
  failed_when:
    - ns_create_stage.rc != 0
    - "'already exists' not in ns_create_stage.stderr"

- name: Template Argo CD Helm values (stage)
  ansible.builtin.template:
    src: values.yml.j2
    dest: "/tmp/argocd-values-stage.yml"
    mode: "0644"
  vars:
    argocd_env: stage

- name: Install Argo CD via Helm (stage)
  ansible.builtin.command:
    cmd: >-
      helm upgrade --install argocd argo/argo-cd
      --namespace {{ argocd_namespace }}
      --kube-context {{ stage_context }}
      --version {{ argocd_chart_version }}
      --values /tmp/argocd-values-stage.yml
      --wait --timeout 5m
  register: helm_install_stage
  changed_when: "'has been upgraded' in helm_install_stage.stdout or 'has been installed' in helm_install_stage.stdout"

- name: Wait for Argo CD server to be ready (stage)
  ansible.builtin.command:
    cmd: >-
      kubectl --context {{ stage_context }}
      -n {{ argocd_namespace }}
      rollout status deployment/argocd-server
      --timeout=300s
  changed_when: false

# --- Install Argo CD to prod context (Model B only) ---

- name: Create Argo CD namespace (prod)
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} create namespace {{ argocd_namespace }}"
  register: ns_create_prod
  changed_when: "'created' in ns_create_prod.stdout"
  failed_when:
    - ns_create_prod.rc != 0
    - "'already exists' not in ns_create_prod.stderr"

- name: Template Argo CD Helm values (prod)
  when: multi_cluster | bool
  ansible.builtin.template:
    src: values.yml.j2
    dest: "/tmp/argocd-values-prod.yml"
    mode: "0644"
  vars:
    argocd_env: prod

- name: Install Argo CD via Helm (prod)
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: >-
      helm upgrade --install argocd argo/argo-cd
      --namespace {{ argocd_namespace }}
      --kube-context {{ prod_context }}
      --version {{ argocd_chart_version }}
      --values /tmp/argocd-values-prod.yml
      --wait --timeout 5m
  register: helm_install_prod
  changed_when: "'has been upgraded' in helm_install_prod.stdout or 'has been installed' in helm_install_prod.stdout"

- name: Wait for Argo CD server to be ready (prod)
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: >-
      kubectl --context {{ prod_context }}
      -n {{ argocd_namespace }}
      rollout status deployment/argocd-server
      --timeout=300s
  changed_when: false

# --- Dry-run validation before applying ---

- name: Validate stage manifests (dry-run)
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} apply --dry-run=client -f {{ item }}"
  loop:
    - "{{ playbook_dir }}/../../argocd/projects/platform-stage.yml"
    - "{{ playbook_dir }}/../../argocd/apps/stage/"
  changed_when: false

- name: Validate prod manifests (dry-run)
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} apply --dry-run=client -f {{ item }}"
  loop:
    - "{{ playbook_dir }}/../../argocd/projects/platform-prod.yml"
    - "{{ playbook_dir }}/../../argocd/apps/prod/"
  changed_when: false

# --- Apply AppProjects ---

- name: Apply stage AppProject
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} apply -f {{ playbook_dir }}/../../argocd/projects/platform-stage.yml"
  register: project_stage
  changed_when: "'configured' in project_stage.stdout or 'created' in project_stage.stdout"

- name: Apply prod AppProject
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} apply -f {{ playbook_dir }}/../../argocd/projects/platform-prod.yml"
  register: project_prod
  changed_when: "'configured' in project_prod.stdout or 'created' in project_prod.stdout"

# --- Apply Applications ---

- name: Apply stage Applications
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} apply -f {{ playbook_dir }}/../../argocd/apps/stage/"
  register: apps_stage
  changed_when: "'configured' in apps_stage.stdout or 'created' in apps_stage.stdout"

- name: Apply prod Applications
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} apply -f {{ playbook_dir }}/../../argocd/apps/prod/"
  register: apps_prod
  changed_when: "'configured' in apps_prod.stdout or 'created' in apps_prod.stdout"

# --- Clean up temp files ---

- name: Remove temporary Helm values files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/argocd-values-stage.yml
    - /tmp/argocd-values-prod.yml

- name: Display Argo CD access information
  ansible.builtin.debug:
    msg: |
      Argo CD Bootstrap Complete
      ==========================

      Stage Argo CD:
        Context: {{ stage_context }}
        Namespace: {{ argocd_namespace }}
        Get admin password:
          kubectl --context {{ stage_context }} -n {{ argocd_namespace }} \
            get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
        Port forward:
          kubectl --context {{ stage_context }} -n {{ argocd_namespace }} \
            port-forward svc/argocd-server 8080:443

      {% if multi_cluster | bool %}
      Prod Argo CD:
        Context: {{ prod_context }}
        Namespace: {{ argocd_namespace }}
        Get admin password:
          kubectl --context {{ prod_context }} -n {{ argocd_namespace }} \
            get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
        Port forward:
          kubectl --context {{ prod_context }} -n {{ argocd_namespace }} \
            port-forward svc/argocd-server 8081:443
      {% endif %}

      Post-bootstrap recommendations:
        1. Change the default admin password
        2. Configure Argo CD Notifications service (Slack, webhook, etc.)
           in the Helm values under configs.notifications.services
        3. Set up SSO/OIDC for team access
