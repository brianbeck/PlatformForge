apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco-stage
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platformforge
    platformforge/env: stage
    platformforge/service: falco
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    notifications.argoproj.io/subscribe.on-health-degraded: ""
    notifications.argoproj.io/subscribe.on-sync-failed: ""
spec:
  project: platform-stage

  # Multi-source: Helm chart + values from this Git repo
  sources:
    # Source 1: Falco Helm chart
    - repoURL: https://falcosecurity.github.io/charts
      chart: falco
      targetRevision: "4.16.3"
      helm:
        valueFiles:
          - $values/platform/falco/base-values.yaml
          - $values/platform/falco/overlays/stage/values.yaml

    # Source 2: This Git repo (for values files reference)
    - repoURL: https://github.com/YOUR_ORG/PlatformForge.git
      targetRevision: main
      ref: values

    # Source 3: Additional manifests (NetworkPolicies, PrometheusRules)
    - repoURL: https://github.com/YOUR_ORG/PlatformForge.git
      targetRevision: main
      path: platform/falco/rules

  destination:
    # MANAGED BY BOOTSTRAP: updated based on environment model
    # Model A: namespace falco-stage, server https://kubernetes.default.svc
    # Model B: namespace falco, server https://kubernetes.default.svc
    server: https://kubernetes.default.svc
    namespace: falco-stage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
