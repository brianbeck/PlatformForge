# Observability Stack stage overlay

prometheus:
  prometheusSpec:
    # Shorter retention in stage to save resources
    retention: 7d
    scrapeInterval: 30s

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # No persistent storage in stage -- ephemeral is fine
    storageSpec: {}

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

grafana:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
