# Falco stage overlay
# Layered on top of base-values.yaml

falco:
  # More verbose logging in stage for debugging
  log_level: debug

  # Lower priority threshold in stage to surface more events
  priority: DEBUG

# Stage: smaller resource footprint
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Enable falcosidekick in stage for observability during development
falcosidekick:
  enabled: true
  config:
    debug: true
  # Webhook output for Argo Events integration (optional)
  # Uncomment and set URL when Argo Events EventSource is deployed
  # webhook:
  #   address: "http://falco-eventsource-svc.argo-events.svc.cluster.local:12000/falco"
