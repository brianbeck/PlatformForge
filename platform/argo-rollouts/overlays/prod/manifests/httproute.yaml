apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-rollouts-dashboard
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/part-of: platformforge
spec:
  parentRefs:
    - name: traefik
      namespace: traefik
      sectionName: websecure
  hostnames:
    - rollouts-prod.brianbeck.net
  rules:
    - backendRefs:
        - name: argo-rollouts-prod-dashboard
          port: 3100
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argo-rollouts-tls
  namespace: argo-rollouts
spec:
  secretName: argo-rollouts-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - rollouts-prod.brianbeck.net
