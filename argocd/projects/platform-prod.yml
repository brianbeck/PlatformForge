apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-prod
  namespace: argocd
spec:
  description: PlatformForge prod environment platform services

  sourceRepos:
    - "https://github.com/YOUR_ORG/PlatformForge.git"
    - "https://falcosecurity.github.io/charts"
    - "https://open-policy-agent.github.io/gatekeeper/charts"

  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "falco-prod"
    - server: "https://kubernetes.default.svc"
      namespace: "gatekeeper-system"
    - server: "https://kubernetes.default.svc"
      namespace: "falco"

  # Gatekeeper CRDs (ConstraintTemplates, Constraints) are cluster-scoped
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: templates.gatekeeper.sh
      kind: ConstraintTemplate
    - group: constraints.gatekeeper.sh
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  orphanedResources:
    warn: true

  # Prod-specific: require manual sync for safety
  syncWindows:
    - kind: allow
      schedule: "* * * * *"
      duration: 24h
      manualSync: true
