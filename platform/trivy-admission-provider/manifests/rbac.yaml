apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-admission-provider
  labels:
    app.kubernetes.io/name: trivy-admission-provider
    app.kubernetes.io/part-of: platformforge
rules:
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["vulnerabilityreports"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trivy-admission-provider
  labels:
    app.kubernetes.io/name: trivy-admission-provider
    app.kubernetes.io/part-of: platformforge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trivy-admission-provider
subjects:
  - kind: ServiceAccount
    name: trivy-admission-provider
    namespace: gatekeeper-system
