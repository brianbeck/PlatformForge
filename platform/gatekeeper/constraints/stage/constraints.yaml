# Stage Constraints
# All constraints use "dryrun" enforcement in stage so violations are
# logged and audited but do not block deployments. This lets teams
# see what would be blocked before prod enforcement kicks in.
#
# Platform namespaces are excluded for consistency with prod.
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockPrivileged
metadata:
  name: block-privileged-containers
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-stage
      - monitoring
      - monitoring-stage
      - traefik
      - trivy-system
      - sealed-secrets
      - external-secrets
      - metallb-system
      - local-path-storage
      - cert-manager
      - argo-rollouts
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: require-team-label
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-stage
      - monitoring
      - monitoring-stage
      - traefik
      - trivy-system
      - sealed-secrets
      - external-secrets
      - metallb-system
      - local-path-storage
      - cert-manager
      - argo-rollouts
  parameters:
    labels:
      - key: "app.kubernetes.io/managed-by"
      - key: "app.kubernetes.io/name"
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sContainerLimits
metadata:
  name: require-resource-limits
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-stage
      - monitoring
      - monitoring-stage
      - traefik
      - trivy-system
      - sealed-secrets
      - external-secrets
      - metallb-system
      - local-path-storage
      - cert-manager
      - argo-rollouts
  parameters:
    requireCPU: true
    requireMemory: true
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockLatestTag
metadata:
  name: block-latest-tag
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-stage
      - monitoring
      - monitoring-stage
      - traefik
      - trivy-system
      - sealed-secrets
      - external-secrets
      - metallb-system
      - local-path-storage
      - cert-manager
      - argo-rollouts
  parameters:
    exemptImages: []
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockHostNamespace
metadata:
  name: block-host-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-stage
      - monitoring
      - monitoring-stage
      - traefik
      - trivy-system
      - sealed-secrets
      - external-secrets
      - metallb-system
      - local-path-storage
      - cert-manager
      - argo-rollouts
  parameters:
    allowHostNetwork: false
    allowHostPID: false
    allowHostIPC: false
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireNonRoot
metadata:
  name: require-nonroot
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: dryrun
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
      - falco-stage
      - monitoring
      - monitoring-stage
      - traefik
      - trivy-system
      - sealed-secrets
      - external-secrets
      - metallb-system
      - local-path-storage
      - cert-manager
      - argo-rollouts
