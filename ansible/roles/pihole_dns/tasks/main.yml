---
# Register service hostnames with Pi-hole v6 DNS servers.
# Runs after Traefik is deployed and has a LoadBalancer IP.

- name: Skip Pi-hole DNS if not enabled
  when: not (pihole_enabled | default(false) | bool)
  ansible.builtin.meta: end_role

- name: Skip Pi-hole DNS if ingress not enabled
  when: not (ingress_enabled | default(false) | bool)
  ansible.builtin.meta: end_role

# --- Load vault secrets ---

- name: Decrypt vault secrets
  ansible.builtin.command:
    cmd: >-
      ansible-vault decrypt
      --vault-password-file {{ playbook_dir }}/../.vault_pass
      --output -
      {{ playbook_dir }}/../vault/secrets.yml
  register: vault_decrypt
  changed_when: false
  no_log: true

- name: Parse vault secrets
  ansible.builtin.set_fact:
    pihole_primary_ip: "{{ (vault_decrypt.stdout | from_yaml).pihole_primary_ip }}"
    pihole_primary_password: "{{ (vault_decrypt.stdout | from_yaml).pihole_primary_password }}"
    pihole_secondary_ip: "{{ (vault_decrypt.stdout | from_yaml).pihole_secondary_ip | default('') }}"
    pihole_secondary_password: "{{ (vault_decrypt.stdout | from_yaml).pihole_secondary_password | default('') }}"
  no_log: true

# --- Wait for Traefik to be deployed by Argo CD ---

- name: Wait for Traefik namespace to exist (stage)
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} get namespace traefik"
  register: traefik_ns_check
  changed_when: false
  retries: 20
  delay: 15
  until: traefik_ns_check.rc == 0

- name: Get Traefik deployment name (stage)
  ansible.builtin.shell:
    cmd: >-
      kubectl --context {{ stage_context }} -n traefik
      get deployment -l app.kubernetes.io/name=traefik
      -o jsonpath='{.items[0].metadata.name}'
  register: traefik_deploy_stage
  changed_when: false
  retries: 5
  delay: 10
  until: traefik_deploy_stage.stdout | trim | length > 0

- name: Wait for Traefik deployment to be ready (stage)
  ansible.builtin.command:
    cmd: >-
      kubectl --context {{ stage_context }} -n traefik
      rollout status deployment/{{ traefik_deploy_stage.stdout | trim }} --timeout=30s
  register: traefik_rollout
  changed_when: false
  retries: 10
  delay: 15
  until: traefik_rollout.rc == 0
  failed_when: false

- name: Wait for Traefik namespace to exist (prod)
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} get namespace traefik"
  register: traefik_ns_check_prod
  changed_when: false
  retries: 20
  delay: 15
  until: traefik_ns_check_prod.rc == 0

- name: Get Traefik deployment name (prod)
  when: multi_cluster | bool
  ansible.builtin.shell:
    cmd: >-
      kubectl --context {{ prod_context }} -n traefik
      get deployment -l app.kubernetes.io/name=traefik
      -o jsonpath='{.items[0].metadata.name}'
  register: traefik_deploy_prod
  changed_when: false
  retries: 5
  delay: 10
  until: traefik_deploy_prod.stdout | trim | length > 0

- name: Wait for Traefik deployment to be ready (prod)
  when: multi_cluster | bool
  ansible.builtin.command:
    cmd: >-
      kubectl --context {{ prod_context }} -n traefik
      rollout status deployment/{{ traefik_deploy_prod.stdout | trim }} --timeout=30s
  register: traefik_rollout_prod
  changed_when: false
  retries: 10
  delay: 15
  until: traefik_rollout_prod.rc == 0
  failed_when: false

# --- Get Traefik LoadBalancer IPs ---

- name: Get Traefik LoadBalancer IP (stage)
  ansible.builtin.shell:
    cmd: >-
      kubectl --context {{ stage_context }}
      -n traefik get svc -l app.kubernetes.io/name=traefik
      -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}'
  register: traefik_ip_stage_raw
  changed_when: false
  retries: 10
  delay: 15
  until: traefik_ip_stage_raw.stdout | trim | length > 0

- name: Get Traefik LoadBalancer IP (prod)
  when: multi_cluster | bool
  ansible.builtin.shell:
    cmd: >-
      kubectl --context {{ prod_context }}
      -n traefik get svc -l app.kubernetes.io/name=traefik
      -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}'
  register: traefik_ip_prod_raw
  changed_when: false
  retries: 10
  delay: 15
  until: traefik_ip_prod_raw.stdout | trim | length > 0

- name: Set Traefik IP facts
  ansible.builtin.set_fact:
    traefik_ip_stage: "{{ traefik_ip_stage_raw.stdout | trim }}"
    traefik_ip_prod: "{{ (traefik_ip_prod_raw.stdout | trim) if multi_cluster | bool else traefik_ip_stage_raw.stdout | trim }}"

- name: Display Traefik IPs
  ansible.builtin.debug:
    msg: |
      Traefik LoadBalancer IPs:
        Stage: {{ traefik_ip_stage }}
        Prod:  {{ traefik_ip_prod }}

# --- Apply Grafana/Prometheus IngressRoutes ---

- name: Wait for monitoring namespace (stage)
  when: grafana_hostname_stage | default('') | length > 0 or prometheus_hostname_stage | default('') | length > 0
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} get namespace {{ monitoring_stage_namespace }}"
  register: mon_ns_stage
  changed_when: false
  retries: 20
  delay: 15
  until: mon_ns_stage.rc == 0

- name: Apply Grafana IngressRoute (stage)
  when: grafana_hostname_stage | default('') | length > 0
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../roles/argocd_bootstrap/templates/ingressroutes/grafana.yml.j2"
    dest: "/tmp/grafana-ingressroute-stage.yml"
    mode: "0644"
  vars:
    grafana_hostname: "{{ grafana_hostname_stage }}"
    monitoring_namespace: "{{ monitoring_stage_namespace }}"
    env_suffix: "stage"

- name: Apply stage Grafana IngressRoute
  when: grafana_hostname_stage | default('') | length > 0
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} apply -f /tmp/grafana-ingressroute-stage.yml"
  changed_when: true

- name: Apply Prometheus IngressRoute (stage)
  when: prometheus_hostname_stage | default('') | length > 0
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../roles/argocd_bootstrap/templates/ingressroutes/prometheus.yml.j2"
    dest: "/tmp/prometheus-ingressroute-stage.yml"
    mode: "0644"
  vars:
    prometheus_hostname: "{{ prometheus_hostname_stage }}"
    monitoring_namespace: "{{ monitoring_stage_namespace }}"
    env_suffix: "stage"

- name: Apply stage Prometheus IngressRoute
  when: prometheus_hostname_stage | default('') | length > 0
  ansible.builtin.command:
    cmd: "kubectl --context {{ stage_context }} apply -f /tmp/prometheus-ingressroute-stage.yml"
  changed_when: true

- name: Wait for monitoring namespace (prod)
  when: multi_cluster | bool and (grafana_hostname_prod | default('') | length > 0 or prometheus_hostname_prod | default('') | length > 0)
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} get namespace {{ monitoring_prod_namespace }}"
  register: mon_ns_prod
  changed_when: false
  retries: 20
  delay: 15
  until: mon_ns_prod.rc == 0

- name: Apply Grafana IngressRoute (prod)
  when: multi_cluster | bool and grafana_hostname_prod | default('') | length > 0
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../roles/argocd_bootstrap/templates/ingressroutes/grafana.yml.j2"
    dest: "/tmp/grafana-ingressroute-prod.yml"
    mode: "0644"
  vars:
    grafana_hostname: "{{ grafana_hostname_prod }}"
    monitoring_namespace: "{{ monitoring_prod_namespace }}"
    env_suffix: "prod"

- name: Apply prod Grafana IngressRoute
  when: multi_cluster | bool and grafana_hostname_prod | default('') | length > 0
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} apply -f /tmp/grafana-ingressroute-prod.yml"
  changed_when: true

- name: Apply Prometheus IngressRoute (prod)
  when: multi_cluster | bool and prometheus_hostname_prod | default('') | length > 0
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../roles/argocd_bootstrap/templates/ingressroutes/prometheus.yml.j2"
    dest: "/tmp/prometheus-ingressroute-prod.yml"
    mode: "0644"
  vars:
    prometheus_hostname: "{{ prometheus_hostname_prod }}"
    monitoring_namespace: "{{ monitoring_prod_namespace }}"
    env_suffix: "prod"

- name: Apply prod Prometheus IngressRoute
  when: multi_cluster | bool and prometheus_hostname_prod | default('') | length > 0
  ansible.builtin.command:
    cmd: "kubectl --context {{ prod_context }} apply -f /tmp/prometheus-ingressroute-prod.yml"
  changed_when: true

- name: Clean up temp IngressRoute files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/grafana-ingressroute-stage.yml
    - /tmp/prometheus-ingressroute-stage.yml
    - /tmp/grafana-ingressroute-prod.yml
    - /tmp/prometheus-ingressroute-prod.yml

# --- Build DNS record list ---

- name: Build DNS records list
  ansible.builtin.set_fact:
    dns_records: >-
      {{
        [
          {'hostname': argocd_hostname_stage, 'ip': traefik_ip_stage},
          {'hostname': argocd_hostname_prod, 'ip': traefik_ip_prod}
        ]
        + ([{'hostname': grafana_hostname_stage, 'ip': traefik_ip_stage}] if grafana_hostname_stage | default('') | length > 0 else [])
        + ([{'hostname': grafana_hostname_prod, 'ip': traefik_ip_prod}] if grafana_hostname_prod | default('') | length > 0 else [])
        + ([{'hostname': prometheus_hostname_stage, 'ip': traefik_ip_stage}] if prometheus_hostname_stage | default('') | length > 0 else [])
        + ([{'hostname': prometheus_hostname_prod, 'ip': traefik_ip_prod}] if prometheus_hostname_prod | default('') | length > 0 else [])
      }}

# --- Authenticate with primary Pi-hole (v6 API) ---

- name: Authenticate with primary Pi-hole
  ansible.builtin.uri:
    url: "http://{{ pihole_primary_ip }}/api/auth"
    method: POST
    body_format: json
    body:
      password: "{{ pihole_primary_password }}"
    status_code: [200]
  register: pihole_primary_auth
  no_log: true

- name: Validate primary Pi-hole authentication
  ansible.builtin.assert:
    that:
      - pihole_primary_auth.json.session.valid | bool
    fail_msg: "Failed to authenticate with primary Pi-hole at {{ pihole_primary_ip }}. Check your password."

- name: Set primary Pi-hole session ID
  ansible.builtin.set_fact:
    pihole_primary_sid: "{{ pihole_primary_auth.json.session.sid }}"
  no_log: true

# --- Register DNS records with primary Pi-hole ---

- name: Register DNS records with primary Pi-hole
  ansible.builtin.uri:
    url: "http://{{ pihole_primary_ip }}/api/config/dns/hosts/{{ item.ip }} {{ item.hostname }}"
    method: PUT
    headers:
      sid: "{{ pihole_primary_sid }}"
    status_code: [200, 201]
  loop: "{{ dns_records }}"
  loop_control:
    label: "{{ item.hostname }} -> {{ item.ip }}"
  register: pihole_primary_result
  failed_when: false

# --- Authenticate and register with secondary Pi-hole ---

- name: Authenticate with secondary Pi-hole
  when: pihole_secondary_ip | length > 0 and pihole_secondary_password | length > 0
  ansible.builtin.uri:
    url: "http://{{ pihole_secondary_ip }}/api/auth"
    method: POST
    body_format: json
    body:
      password: "{{ pihole_secondary_password }}"
    status_code: [200]
  register: pihole_secondary_auth
  no_log: true

- name: Set secondary Pi-hole session ID
  when: pihole_secondary_ip | length > 0 and pihole_secondary_password | length > 0
  ansible.builtin.set_fact:
    pihole_secondary_sid: "{{ pihole_secondary_auth.json.session.sid }}"
  no_log: true

- name: Register DNS records with secondary Pi-hole
  when: pihole_secondary_ip | length > 0 and pihole_secondary_password | length > 0
  ansible.builtin.uri:
    url: "http://{{ pihole_secondary_ip }}/api/config/dns/hosts/{{ item.ip }} {{ item.hostname }}"
    method: PUT
    headers:
      sid: "{{ pihole_secondary_sid }}"
    status_code: [200, 201]
  loop: "{{ dns_records }}"
  loop_control:
    label: "{{ item.hostname }} -> {{ item.ip }}"
  register: pihole_secondary_result
  failed_when: false

- name: Display DNS registration summary
  ansible.builtin.debug:
    msg: |
      Pi-hole DNS Registration Summary
      =================================
      {% for record in dns_records %}
      {{ record.hostname }} -> {{ record.ip }}
      {% endfor %}

      Primary Pi-hole ({{ pihole_primary_ip }}): Done
      {% if pihole_secondary_ip | length > 0 %}
      Secondary Pi-hole ({{ pihole_secondary_ip }}): Done
      {% endif %}
