---
# PlatformForge Teardown Playbook
#
# Cleanly removes all PlatformForge components from cluster(s).
# Must be run BEFORE destroying clusters to avoid dangling webhooks
# and finalizers that block namespace deletion.
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/teardown.yml

- name: Teardown PlatformForge
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Verify required tools are installed
      ansible.builtin.command:
        cmd: "{{ item }} version"
      loop:
        - kubectl
        - helm
      changed_when: false
      failed_when: tool_check.rc != 0
      register: tool_check

    - name: Load environment configuration
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../environments.yml"
      ignore_errors: true
      register: env_load

    - name: Fail if environment config not found
      ansible.builtin.assert:
        that:
          - env_load is not failed
        fail_msg: |
          environments.yml not found. Either bootstrap was never run,
          or the file was deleted. You can create it manually or specify
          the contexts below.

    - name: Display teardown warning
      ansible.builtin.pause:
        prompt: |

          ================================================
           PlatformForge Teardown
          ================================================

           WARNING: This will remove ALL PlatformForge
           components from your cluster(s):

             - Argo CD Applications
             - Gatekeeper (including admission webhooks)
             - Falco
             - Observability Stack (Prometheus, Grafana, Alertmanager)
             - Argo CD itself
             - All associated namespaces

           Stage context: {{ stage_context }}
           Prod context:  {{ prod_context }}
           Model: {{ env_model }}

           Type 'yes' to proceed
      register: confirm_teardown

    - name: Abort if not confirmed
      ansible.builtin.assert:
        that:
          - confirm_teardown.user_input == 'yes'
        fail_msg: "Teardown aborted."

  tasks:
    # ============================================================
    # STAGE CLUSTER TEARDOWN
    # ============================================================

    - name: "STAGE: Delete all Argo CD Applications"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} -n argocd delete applications --all --wait=false"
      register: result
      changed_when: "'deleted' in result.stdout"
      failed_when: false

    - name: "STAGE: Wait for applications to terminate"
      ansible.builtin.pause:
        seconds: 10

    # Remove webhooks BEFORE deleting namespaces to prevent blocking
    - name: "STAGE: Remove Traefik cluster-scoped resources"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/name=traefik --ignore-not-found
      changed_when: false
      failed_when: false

    - name: "STAGE: Remove Traefik IngressClass"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} delete ingressclass traefik --ignore-not-found"
      changed_when: false
      failed_when: false

    - name: "STAGE: Remove Gatekeeper validating webhooks"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} delete validatingwebhookconfiguration {{ item }} --ignore-not-found"
      loop:
        - gatekeeper-validating-webhook-configuration
      changed_when: "'deleted' in result.stdout"
      failed_when: false
      register: result

    - name: "STAGE: Remove Gatekeeper mutating webhooks"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} delete mutatingwebhookconfiguration {{ item }} --ignore-not-found"
      loop:
        - gatekeeper-mutating-webhook-configuration
      changed_when: "'deleted' in result.stdout"
      failed_when: false
      register: result

    - name: "STAGE: Remove Gatekeeper labeled webhooks"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} delete validatingwebhookconfiguration -l gatekeeper.sh/system=yes --ignore-not-found"
      changed_when: false
      failed_when: false

    - name: "STAGE: Remove Prometheus/Observability webhooks (all naming variants)"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration,mutatingwebhookconfiguration
          -l app.kubernetes.io/instance=observability-stage --ignore-not-found;
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration,mutatingwebhookconfiguration
          -l app.kubernetes.io/instance=prometheus-stack-stage --ignore-not-found;
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration
          prometheus-stack-stage-kub-admission --ignore-not-found;
          kubectl --context {{ stage_context }} delete validatingwebhookconfiguration
          observability-stage-kube-p-admission --ignore-not-found
      changed_when: false
      failed_when: false

    - name: "STAGE: Remove orphaned cluster roles from observability stack"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/instance=observability-stage --ignore-not-found;
          kubectl --context {{ stage_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/instance=prometheus-stack-stage --ignore-not-found
      changed_when: false
      failed_when: false

    # Remove CRDs that have finalizers
    - name: "STAGE: Remove Gatekeeper ConstraintTemplates"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} delete constrainttemplates --all --ignore-not-found"
      changed_when: false
      failed_when: false

    # Uninstall Helm releases
    - name: "STAGE: Uninstall Argo CD Helm release"
      ansible.builtin.command:
        cmd: "helm --kube-context {{ stage_context }} uninstall argocd -n argocd --wait"
      changed_when: false
      failed_when: false

    # Clean up Helm hook jobs that block reinstall
    - name: "STAGE: Delete Helm hook jobs in all platform namespaces"
      ansible.builtin.shell:
        cmd: "kubectl --context {{ stage_context }} delete jobs --all -n {{ item }} --force --ignore-not-found 2>/dev/null"
      loop:
        - monitoring
        - monitoring-stage
        - gatekeeper-system
        - falco
        - falco-stage
      changed_when: false
      failed_when: false

    # Uninstall Helm releases before deleting namespaces
    - name: "STAGE: Uninstall platform Helm releases"
      ansible.builtin.command:
        cmd: "helm --kube-context {{ stage_context }} uninstall {{ item.name }} -n {{ item.ns }} --wait"
      loop:
        - { name: "traefik-stage", ns: "traefik" }
        - { name: "observability-stage", ns: "monitoring" }
        - { name: "observability-stage", ns: "monitoring-stage" }
        - { name: "gatekeeper-core-stage", ns: "gatekeeper-system" }
        - { name: "falco-stage", ns: "falco" }
        - { name: "falco-stage", ns: "falco-stage" }
        - { name: "trivy-operator-stage", ns: "trivy-system" }
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      failed_when: false

    # Delete namespaces
    - name: "STAGE: Delete platform namespaces"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} delete namespace {{ item }} --ignore-not-found --wait=false"
      loop:
        - argocd
        - trivy-system
        - falco
        - falco-stage
        - gatekeeper-system
        - monitoring
        - monitoring-stage
        - traefik
      changed_when: "'deleted' in result.stdout"
      failed_when: false
      register: result

    - name: "STAGE: Wait for namespaces to terminate"
      ansible.builtin.pause:
        seconds: 15

    # Force-remove any stuck namespaces
    - name: "STAGE: Check for stuck namespaces"
      ansible.builtin.command:
        cmd: "kubectl --context {{ stage_context }} get namespace {{ item }} -o jsonpath='{.status.phase}'"
      loop:
        - argocd
        - falco
        - falco-stage
        - gatekeeper-system
        - monitoring
        - monitoring-stage
        - traefik
      register: ns_status
      changed_when: false
      failed_when: false

    - name: "STAGE: Force-remove stuck namespaces (clear finalizers)"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ stage_context }} get namespace {{ item.item }} -o json
          | jq '.spec.finalizers = []'
          | kubectl --context {{ stage_context }} replace --raw "/api/v1/namespaces/{{ item.item }}/finalize" -f -
      when:
        - item.rc == 0
        - "'Terminating' in item.stdout"
      loop: "{{ ns_status.results }}"
      loop_control:
        label: "{{ item.item }}"
      changed_when: true
      failed_when: false

    # ============================================================
    # PROD CLUSTER TEARDOWN
    # Cluster-scoped singletons: only on separate prod cluster (Model B)
    # Namespace-scoped services: always (both Model A and B)
    # ============================================================

    - name: "PROD: Delete all Argo CD Applications"
      when: multi_cluster | bool  # Singleton: skip in Model A
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} -n argocd delete applications --all --wait=false"
      register: result
      changed_when: "'deleted' in result.stdout"
      failed_when: false

    - name: "PROD: Wait for applications to terminate"
      when: multi_cluster | bool
      ansible.builtin.pause:
        seconds: 10

    - name: "PROD: Remove Traefik cluster-scoped resources"
      when: multi_cluster | bool  # Singleton
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/name=traefik --ignore-not-found
      changed_when: false
      failed_when: false

    - name: "PROD: Remove Traefik IngressClass"
      when: multi_cluster | bool  # Singleton
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete ingressclass traefik --ignore-not-found"
      changed_when: false
      failed_when: false

    - name: "PROD: Remove Gatekeeper validating webhooks"
      when: multi_cluster | bool  # Singleton
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete validatingwebhookconfiguration {{ item }} --ignore-not-found"
      loop:
        - gatekeeper-validating-webhook-configuration
      changed_when: false
      failed_when: false

    - name: "PROD: Remove Gatekeeper mutating webhooks"
      when: multi_cluster | bool  # Singleton
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete mutatingwebhookconfiguration {{ item }} --ignore-not-found"
      loop:
        - gatekeeper-mutating-webhook-configuration
      changed_when: false
      failed_when: false

    - name: "PROD: Remove Gatekeeper labeled webhooks"
      when: multi_cluster | bool  # Singleton
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete validatingwebhookconfiguration -l gatekeeper.sh/system=yes --ignore-not-found"
      changed_when: false
      failed_when: false

    - name: "PROD: Remove Prometheus/Observability webhooks"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration,mutatingwebhookconfiguration
          -l app.kubernetes.io/instance=observability-prod --ignore-not-found;
          kubectl --context {{ prod_context }} delete validatingwebhookconfiguration,mutatingwebhookconfiguration
          -l app.kubernetes.io/instance=prometheus-stack-prod --ignore-not-found;
          true
      changed_when: false
      failed_when: false

    - name: "PROD: Remove orphaned cluster roles from observability stack"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/instance=observability-prod --ignore-not-found;
          kubectl --context {{ prod_context }} delete clusterrole,clusterrolebinding
          -l app.kubernetes.io/instance=prometheus-stack-prod --ignore-not-found;
          true
      changed_when: false
      failed_when: false

    - name: "PROD: Remove Gatekeeper ConstraintTemplates"
      when: multi_cluster | bool  # Cluster-scoped: already removed in Model A stage cleanup
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete constrainttemplates --all --ignore-not-found"
      changed_when: false
      failed_when: false

    - name: "PROD: Uninstall Argo CD Helm release"
      when: multi_cluster | bool  # Singleton
      ansible.builtin.command:
        cmd: "helm --kube-context {{ prod_context }} uninstall argocd -n argocd --wait"
      changed_when: false
      failed_when: false

    - name: "PROD: Delete Helm hook jobs in prod namespaces"
      ansible.builtin.shell:
        cmd: "kubectl --context {{ prod_context }} delete jobs --all -n {{ item }} --force --ignore-not-found 2>/dev/null; true"
      loop:
        - monitoring-prod
        - monitoring
        - falco-prod
        - falco
      changed_when: false
      failed_when: false

    - name: "PROD: Uninstall namespace-scoped Helm releases"
      ansible.builtin.command:
        cmd: "helm --kube-context {{ prod_context }} uninstall {{ item.name }} -n {{ item.ns }} --wait"
      loop:
        - { name: "observability-prod", ns: "monitoring" }
        - { name: "observability-prod", ns: "monitoring-prod" }
        - { name: "falco-prod", ns: "falco" }
        - { name: "falco-prod", ns: "falco-prod" }
        - { name: "trivy-operator-prod", ns: "trivy-system" }
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      failed_when: false

    - name: "PROD: Uninstall cluster-scoped Helm releases"
      when: multi_cluster | bool  # Singletons
      ansible.builtin.command:
        cmd: "helm --kube-context {{ prod_context }} uninstall {{ item.name }} -n {{ item.ns }} --wait"
      loop:
        - { name: "traefik-prod", ns: "traefik" }
        - { name: "gatekeeper-core-prod", ns: "gatekeeper-system" }
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      failed_when: false

    - name: "PROD: Delete namespace-scoped namespaces"
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete namespace {{ item }} --ignore-not-found --wait=false"
      loop:
        - falco-prod
        - monitoring-prod
      changed_when: false
      failed_when: false

    - name: "PROD: Delete cluster-scoped namespaces"
      when: multi_cluster | bool  # Singletons: already deleted in Model A stage cleanup
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} delete namespace {{ item }} --ignore-not-found --wait=false"
      loop:
        - argocd
        - falco
        - gatekeeper-system
        - monitoring
        - traefik
      changed_when: false
      failed_when: false

    - name: "PROD: Wait for namespaces to terminate"
      ansible.builtin.pause:
        seconds: 15

    - name: "PROD: Check for stuck namespaces"
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} get namespace {{ item }} -o jsonpath='{.status.phase}'"
      loop:
        - falco-prod
        - monitoring-prod
      register: ns_status_prod
      changed_when: false
      failed_when: false

    - name: "PROD: Check for stuck cluster-scoped namespaces"
      when: multi_cluster | bool
      ansible.builtin.command:
        cmd: "kubectl --context {{ prod_context }} get namespace {{ item }} -o jsonpath='{.status.phase}'"
      loop:
        - argocd
        - falco
        - gatekeeper-system
        - monitoring
        - traefik
      register: ns_status_prod_cluster
      changed_when: false
      failed_when: false

    - name: "PROD: Force-remove stuck namespaces"
      when:
        - item.rc == 0
        - "'Terminating' in item.stdout"
      ansible.builtin.shell:
        cmd: >-
          kubectl --context {{ prod_context }} get namespace {{ item.item }} -o json
          | jq '.spec.finalizers = []'
          | kubectl --context {{ prod_context }} replace --raw "/api/v1/namespaces/{{ item.item }}/finalize" -f -
      loop: "{{ (ns_status_prod.results | default([])) + (ns_status_prod_cluster.results | default([])) }}"
      loop_control:
        label: "{{ item.item }}"
      changed_when: true
      failed_when: false

  post_tasks:
    - name: Teardown complete
      ansible.builtin.debug:
        msg: |
          ================================================
           PlatformForge teardown complete!
          ================================================

           All platform components have been removed.

           To redeploy, run:
             cd ansible
             ansible-playbook playbooks/bootstrap.yml

          ================================================
