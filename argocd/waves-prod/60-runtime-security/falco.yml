# Falco - Namespace-scoped (per environment)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: falco
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: "prod"
            namespace: "falco"
            project: "platform-prod"
  template:
    metadata:
      name: "falco-{{env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: platformforge
        platformforge/service: falco
      annotations:
        argocd.argoproj.io/sync-wave: "60"
        notifications.argoproj.io/subscribe.on-health-degraded: ""
        notifications.argoproj.io/subscribe.on-sync-failed: ""
    spec:
      project: "{{project}}"
      sources:
        - repoURL: https://falcosecurity.github.io/charts
          chart: falco
          targetRevision: "8.0.1"
          helm:
            valueFiles:
              - $values/platform/falco/base-values.yaml
              - "$values/platform/falco/overlays/{{env}}/values.yaml"
        - repoURL: https://github.com/brianbeck/PlatformForge.git
          targetRevision: main
          ref: values
        - repoURL: https://github.com/brianbeck/PlatformForge.git
          targetRevision: main
          path: platform/falco/rules
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
