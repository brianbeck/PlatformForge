apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-stage
  namespace: argocd
spec:
  description: PlatformForge stage environment platform services

  # Only allow deploying from this repository
  sourceRepos:
    - "https://github.com/YOUR_ORG/PlatformForge.git"
    - "https://falcosecurity.github.io/charts"
    - "https://open-policy-agent.github.io/gatekeeper/charts"
    - "https://prometheus-community.github.io/helm-charts"

  # Allowed destination namespaces for stage
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "falco-stage"
    - server: "https://kubernetes.default.svc"
      namespace: "gatekeeper-system"
    - server: "https://kubernetes.default.svc"
      namespace: "monitoring-stage"
    - server: "https://kubernetes.default.svc"
      namespace: "falco"
    - server: "https://kubernetes.default.svc"
      namespace: "monitoring"

  # Cluster-scoped resources needed by platform services
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: templates.gatekeeper.sh
      kind: ConstraintTemplate
    - group: constraints.gatekeeper.sh
      kind: "*"
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: monitoring.coreos.com
      kind: PrometheusRule

  # Scoped namespace resources -- only what platform services need
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: ReplicaSet
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Endpoints
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    - group: monitoring.coreos.com
      kind: Prometheus
    - group: monitoring.coreos.com
      kind: Alertmanager
    - group: ""
      kind: Pod
    - group: batch
      kind: Job
    - group: policy
      kind: PodDisruptionBudget

  # Prevent accidental deletion of important resources
  orphanedResources:
    warn: true
