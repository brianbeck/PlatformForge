# Argo Rollouts base Helm values
# Provides progressive delivery (blue-green, canary) for application
# Deployments. Consumed by DevExForge, which creates Rollout CRs in
# team namespaces.

# Install CRDs and keep them on uninstall (Argo CD owns lifecycle).
installCRDs: true
keepCRDs: true

controller:
  replicas: 1

  # Gateway API traffic router plugin for weighted canary deployments.
  # Argo Rollouts manipulates HTTPRoute backendRef weights to shift
  # traffic between stable and canary services during a canary rollout.
  # Requires Gateway API CRDs (v1.4.0) and a Traefik Gateway resource.
  trafficRouterPlugins:
    - name: "argoproj-labs/gatewayAPI"
      location: "https://github.com/argoproj-labs/rollouts-plugin-trafficrouter-gatewayapi/releases/download/v0.13.0/gatewayapi-plugin-linux-amd64"

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        app.kubernetes.io/part-of: platformforge

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Web dashboard. Exposed via Traefik IngressRoute (see platform/argo-rollouts/overlays/<env>/ingressroute.yaml).
# Auth is intentionally disabled — dashboard sits behind internal Pi-hole DNS,
# not the public internet.
dashboard:
  enabled: true
  replicas: 1
  service:
    type: ClusterIP
    port: 3100
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ServiceAccount used by the controller. (Traefik IngressRoute RBAC was
# removed -- not needed without the traffic-router plugin.)
serviceAccount:
  create: true
  name: argo-rollouts
