# RBAC granting the argo-rollouts controller permission to read and patch
# Traefik IngressRoute resources. Required by the Traefik traffic router
# plugin to shift weights between stable and canary services.
#
# Deployed by the argo-rollouts-rbac ApplicationSet (sync wave 80).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-rollouts-traefik
  labels:
    app.kubernetes.io/part-of: platformforge
    app.kubernetes.io/component: argo-rollouts
rules:
  - apiGroups: ["traefik.io", "traefik.containo.us"]
    resources: ["ingressroutes", "traefikservices"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-rollouts-traefik
  labels:
    app.kubernetes.io/part-of: platformforge
    app.kubernetes.io/component: argo-rollouts
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-rollouts-traefik
subjects:
  - kind: ServiceAccount
    name: argo-rollouts
    namespace: argo-rollouts
